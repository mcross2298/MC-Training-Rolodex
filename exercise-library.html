<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MC Training">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Exercise Library &mdash; MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;padding-bottom:60px;}
.header{background:linear-gradient(90deg,#0d1f3c,#050d1a);padding:60px 20px 24px;border-bottom:1px solid rgba(212,175,55,0.15);position:relative;}
.back-link{position:absolute;top:18px;left:18px;color:#d4af37;text-decoration:none;font-size:13px;font-weight:700;background:rgba(212,175,55,0.12);padding:6px 14px;border-radius:20px;border:1px solid rgba(212,175,55,0.35);}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#d4af37;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:var(--fs-title);font-weight:var(--fw-black);color:#fff;margin-bottom:10px;}
.subtitle{font-size:13px;color:var(--muted);font-weight:600;}
.content{max-width:680px;margin:0 auto;padding:0 16px;}
.search-wrap{position:sticky;top:0;z-index:10;background:#050d1a;padding:14px 0 10px;border-bottom:1px solid rgba(255,255,255,0.06);}
.search-box{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 16px 12px 40px;color:#e2e8f0;font-size:16px;font-weight:600;outline:none;}/* 16px: no iOS focus-zoom */
.search-box::placeholder{color:#334155;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.search-rel{position:relative;}
.filter-wrap{display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;-webkit-overflow-scrolling:touch;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:0.04em;transition:all 0.15s;}
.filter-btn.active{background:rgba(212,175,55,0.2);border-color:rgba(212,175,55,0.5);color:#fbbf24;}
.results-count{font-size:11px;color:#475569;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:14px 0 8px;}
.ex-list{display:flex;flex-direction:column;gap:6px;}
.ex-item{background:#0d1f3c;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.ex-muscle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ex-name{flex:1;font-size:13px;font-weight:700;color:#e2e8f0;line-height:1.4;}
.ex-programs{font-size:11px;color:#334155;font-weight:600;margin-top:2px;}
.ex-muscle-tag{font-size:14px;flex-shrink:0;}
.fav-btn{flex-shrink:0;background:none;border:none;font-size:19px;line-height:1;color:#334155;cursor:pointer;padding:2px 0 2px 8px;-webkit-tap-highlight-color:transparent;transition:color .15s,transform .1s;}
.fav-btn.on{color:#d4af37;}
.fav-btn:active{transform:scale(0.85);}
.master-group{border-radius:10px;overflow:hidden;border:1px solid rgba(212,175,55,0.2);background:#0d1f3c;}
.master-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.master-header:active{background:#112240;}
.master-chevron{font-size:11px;color:#d4af37;transition:transform 0.2s;flex-shrink:0;margin-left:auto;}
.master-group.open .master-chevron{transform:rotate(180deg);}
.master-label{font-size:11px;font-weight:800;letter-spacing:0.08em;color:#d4af37;text-transform:uppercase;margin-top:2px;}
.variations{display:none;flex-direction:column;border-top:1px solid rgba(255,255,255,0.06);}
.master-group.open .variations{display:flex;}
.var-item{background:#091525;padding:10px 14px 10px 34px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.04);}
.var-item:last-child{border-bottom:none;}
.var-name{flex:1;font-size:13px;font-weight:600;color:#94a3b8;line-height:1.4;}
.var-programs{font-size:11px;color:#1e3050;font-weight:600;margin-top:2px;}
.var-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:0.6;}
/* .empty-state / .empty-icon / .empty-text now come from base.css (L1 Phase C
   shared empty-state vocabulary) — local overrides removed to converge. */
.lib-note{margin:14px 0 0;font-size:11px;color:#334155;line-height:1.5;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;}
.phase8-badge{display:inline-block;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.3);color:#d4af37;font-size:11px;font-weight:800;letter-spacing:0.1em;padding:2px 8px;border-radius:20px;margin-left:8px;text-transform:uppercase;vertical-align:middle;}
/* Replace mode — arrived via ?replace= so the user can pick a swap */
.replace-banner{background:linear-gradient(90deg,rgba(34,211,238,0.14),rgba(34,211,238,0.05));border:1px solid rgba(34,211,238,0.3);border-radius:10px;padding:11px 14px;margin:14px 0 0;color:#a5f3fc;font-size:13px;font-weight:700;line-height:1.5;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.replace-banner strong{color:#22d3ee;}
.replace-banner a{margin-left:auto;color:#94a3b8;font-size:12px;font-weight:800;text-decoration:none;border:1px solid rgba(255,255,255,0.15);padding:5px 12px;border-radius:14px;-webkit-tap-highlight-color:transparent;}
.ex-item.pickable,.var-item.pickable{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s,border-color .12s;}
.ex-item.pickable:active,.var-item.pickable:active{background:#112240;border-color:rgba(34,211,238,0.4);}
.pick-cue{font-size:11px;font-weight:800;color:#22d3ee;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.28);border-radius:14px;padding:3px 9px;flex-shrink:0;letter-spacing:0.04em;white-space:nowrap;}
</style>
<link rel="stylesheet" href="base.css?v=68"/>
<link rel="stylesheet" href="mc-nav.css"/>
<script src="mc-theme.js"></script>
  <link rel="stylesheet" href="mc-light.css">
</head>
<body>
<div class="header">
  <a href="dashboard.html" class="back-link">&larr; Home</a>
  <div class="header-inner">
    <div class="eyebrow">&#9889; MC Training</div>
    <div class="title">Exercise Library <span class="phase8-badge">Phase 8</span></div>
    <div class="subtitle" id="totalCount">Loading...</div>
  </div>
</div>
<div class="content">
  <div class="replace-banner" id="replaceBanner" style="display:none"></div>
  <div class="search-wrap">
    <div class="search-rel">
      <span class="search-icon">&#128269;</span>
      <input type="text" class="search-box" id="searchBox" placeholder="Search exercises..." oninput="filterExercises()"/>
    </div>
    <div class="filter-wrap" id="filterWrap"></div>
  </div>
  <div class="results-count" id="resultsCount"></div>
  <div class="ex-list" id="exList"></div>
  <p class="lib-note">Global exercise catalog &mdash; Phase 8 updated. Set techniques (Cluster, Heavy, Warm-up, Finisher) appear in workout programs but are excluded here for clean browsing.</p>
</div>
<script src="exercise-catalog.js"></script>
<script src="mc-exercise-catalog.js"></script>
<script>

var activeFilter="All";

// ── Replace mode ──────────────────────────────────────────────────────────
// Reached from a program page's "Replace exercise → Browse all" flow, which
// links here as ?replace=<orig name>&from=<program page>&muscle=<group>. In this
// mode every exercise row becomes tappable: picking one writes the swap to the
// origin page's scoped key (mc_replacements|<from>) — the same shape
// mc-replace.js/mc-card-actions.js read — then returns to that program page,
// where applyReplacements() repaints the card with its REPLACED badge.
var _params=new URLSearchParams(location.search);
var REPLACE_ORIG=_params.get('replace')||"";
var RETURN_PAGE=_params.get('from')||"";

function renderReplaceBanner(){
  if(!REPLACE_ORIG) return;
  var b=document.getElementById("replaceBanner");
  if(!b) return;
  var cancel=RETURN_PAGE||"index.html";
  b.innerHTML='&#128257; Replacing <strong>'+esc(REPLACE_ORIG)+'</strong> &mdash; tap an exercise to swap it in.'
    +'<a href="'+esc(cancel)+'">Cancel</a>';
  b.style.display="flex";
}

function pickReplacement(el){
  var newName=el&&el.dataset?el.dataset.pickname:"";
  if(!REPLACE_ORIG||!newName) return;
  var orig=REPLACE_ORIG.toLowerCase();
  function write(key){
    var m={};
    try{ m=JSON.parse(localStorage.getItem(key)||"{}"); }catch(e){ m={}; }
    // re-root chains: if orig is already a replacement target, update that
    // original key instead of forking a new one.
    var rootKey=orig;
    Object.keys(m).forEach(function(k){ if(m[k]&&String(m[k]).toLowerCase()===orig) rootKey=k; });
    m[rootKey]=newName;
    try{ localStorage.setItem(key,JSON.stringify(m)); }catch(e){}
  }
  if(RETURN_PAGE){
    write("mc_replacements|"+RETURN_PAGE);
    window.location.href=RETURN_PAGE;
  } else {
    // Legacy link with no origin page: fall back to the global key (mc-replace.js
    // migrates it into the scoped key on the next program-page load) and go back.
    write("mc_replacements");
    if(history.length>1) history.back(); else window.location.href="index.html";
  }
}

// ── Favorites (device-local) ──────────────────────────────────────────────
var FAV_KEY="mc_ex_favs";
function getFavs(){ try{return JSON.parse(localStorage.getItem(FAV_KEY)||"[]")||[];}catch(e){return [];} }
function isFav(name){ return getFavs().indexOf(name)!==-1; }
function toggleFav(name){
  var f=getFavs(), i=f.indexOf(name);
  if(i>=0) f.splice(i,1); else f.push(name);
  try{ localStorage.setItem(FAV_KEY,JSON.stringify(f)); }catch(e){}
  filterExercises();
}
function favClick(ev,btn){ ev.stopPropagation(); toggleFav(btn.dataset.name); }
function favBtnHTML(name){
  var on=isFav(name);
  return '<button class="fav-btn'+(on?' on':'')+'" data-name="'+esc(name)+'" onclick="favClick(event,this)" aria-label="Toggle favorite" title="Toggle favorite">'+(on?'&#9733;':'&#9734;')+'</button>';
}

// Phase 1: cardio/conditioning/core work now lives in the Conditioning tab.
// These muscle groups are filtered OUT of the main library (data is kept intact
// in EXERCISES — this is a display filter only, reversible and Phase-3 ready).
var CONDITIONING_MUSCLES=["Cardio","Core"];
function isConditioning(ex){return CONDITIONING_MUSCLES.indexOf(ex.muscle)!==-1;}

function buildFilters(){
  var muscles=["★","All"].concat(Object.keys(MUSCLE_COLORS).filter(function(m){return CONDITIONING_MUSCLES.indexOf(m)===-1;}).sort());
  var html="";
  for(var i=0;i<muscles.length;i++){
    var m=muscles[i];
    var cls="filter-btn"+(m===activeFilter?" active":"");
    var label=(m==="★")?"★ Favorites":((MUSCLE_ICONS[m]||"")+" "+m);
    html+='<button class="'+cls+'" data-muscle="'+m+'" onclick="setFilter(this.dataset.muscle)">'+label+"</button>";
  }
  document.getElementById("filterWrap").innerHTML=html;
}

function setFilter(m){
  activeFilter=m;
  var btns=document.querySelectorAll(".filter-btn");
  for(var i=0;i<btns.length;i++){
    btns[i].classList.toggle("active",btns[i].dataset.muscle===m);
  }
  filterExercises();
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toggleGroup(el){
  var grp=el.closest(".master-group");
  grp.classList.toggle("open");
}

function buildMasterGroup(masterName,variations,muscle){
  var col=MUSCLE_COLORS[muscle]||"var(--muted)";
  var varRows="";
  for(var i=0;i<variations.length;i++){
    var ex=variations[i];
    var progs=(ex.programs||[]).join(" &middot; ");
    var vpick=REPLACE_ORIG?' pickable" data-pickname="'+esc(ex.name)+'" onclick="pickReplacement(this)':"";
    var vcue=REPLACE_ORIG?'<span class="pick-cue">Swap in &rarr;</span>':"";
    varRows+='<div class="var-item'+vpick+'">'
      +'<div class="var-dot" style="background:'+col+';"></div>'
      +'<div style="flex:1">'
      +'<div class="var-name">'+esc(ex.name)+"</div>"
      +"</div>"
      +vcue
      +favBtnHTML(ex.name)
      +"</div>";
  }
  var safeid=masterName.replace(/ /g,"-").replace(/[^a-zA-Z0-9-]/g,"");
  return '<div class="master-group" id="mg-'+safeid+'">'
    +'<div class="master-header" onclick="toggleGroup(this)">'
    +'<div class="ex-muscle-dot" style="background:'+col+';box-shadow:0 0 5px '+col+'44;"></div>'
    +'<div style="flex:1">'
    +'<div class="ex-name">'+esc(masterName)+"</div>"
    +'<div class="master-label">'+esc(muscle)+' &nbsp;&middot;&nbsp; <span style="color:#475569;font-weight:700;">'+variations.length+" variations &mdash; tap to expand</span></div>"
    +"</div>"
    +'<span class="master-chevron">&#9660;</span>'
    +"</div>"
    +'<div class="variations">'+varRows+"</div>"
    +"</div>";
}

function exItemHTML(ex){
  var col=MUSCLE_COLORS[ex.muscle]||"var(--muted)";
  var isCustom=ex.custom||((ex.programs||[]).indexOf('Custom')!==-1);
  var isPub=(ex.programs||[]).indexOf('Published')!==-1;
  var badge=isCustom?'<span style="font-size:10px;font-weight:800;letter-spacing:0.08em;padding:2px 7px;border-radius:5px;background:rgba(212,175,55,0.12);color:#d4af37;border:1px solid rgba(212,175,55,0.3);margin-left:6px;vertical-align:middle;">YOUR EXERCISE</span>'
    :isPub?'<span style="font-size:10px;font-weight:800;letter-spacing:0.08em;padding:2px 7px;border-radius:5px;background:rgba(34,211,238,0.1);color:#22d3ee;border:1px solid rgba(34,211,238,0.25);margin-left:6px;vertical-align:middle;">ADDED</span>'
    :"";
  var pick=REPLACE_ORIG?' pickable" data-pickname="'+esc(ex.name)+'" onclick="pickReplacement(this)':"";
  var cue=REPLACE_ORIG?'<span class="pick-cue">Swap in &rarr;</span>':"";
  return '<div class="ex-item'+pick+'">'
    +'<div class="ex-muscle-dot" style="background:'+col+';box-shadow:0 0 5px '+col+'44;"></div>'
    +'<div style="flex:1">'
    +'<div class="ex-name">'+esc(ex.name)+badge+"</div>"
    +"</div>"
    +'<div class="ex-muscle-tag">'+(MUSCLE_ICONS[ex.muscle]||"")+"</div>"
    +cue
    +favBtnHTML(ex.name)
    +"</div>";
}

function filterExercises(){
  var q=(document.getElementById("searchBox").value||"").toLowerCase().trim();
  var list=document.getElementById("exList");
  var countEl=document.getElementById("resultsCount");
  var filtered=[];
  var i;

  var favView=(activeFilter==="★");
  for(i=0;i<EXERCISES.length;i++){
    var e=EXERCISES[i];
    if(isConditioning(e)) continue; // cardio/core moved to the Conditioning tab
    if(favView){ if(!isFav(e.name)) continue; }
    else if(activeFilter!=="All" && e.muscle!==activeFilter) continue;
    if(q && e.name.toLowerCase().indexOf(q)===-1) continue;
    filtered.push(e);
  }

  var suffix=favView?" favorited":(activeFilter!=="All"?" in "+activeFilter:"");

  // Flat list for a search OR the Favorites view; grouped master-list otherwise.
  if(q || favView){
    if(!filtered.length){
      if(favView && !q){
        countEl.textContent="No favorites yet";
        list.innerHTML='<div class="empty-state"><div class="empty-icon">&#9733;</div><div class="empty-text">No favorites yet — tap a &#9734; to save one</div></div>';
      } else {
        countEl.textContent="0 exercises"+suffix+(q?" matching "+q:"");
        list.innerHTML='<div class="empty-state"><div class="empty-icon">&#127947;</div><div class="empty-text">No exercises found</div></div>';
      }
      return;
    }
    countEl.textContent=filtered.length+" exercise"+(filtered.length!==1?"s":"")+suffix+(q?" matching "+q:"");
    var rows="";
    for(i=0;i<filtered.length;i++) rows+=exItemHTML(filtered[i]);
    list.innerHTML=rows;
    return;
  }

  var masterMap={};
  var standalones=[];
  for(i=0;i<filtered.length;i++){
    var ex=filtered[i];
    if(ex.master){
      if(!masterMap[ex.master]) masterMap[ex.master]={muscle:ex.muscle,variations:[]};
      masterMap[ex.master].variations.push(ex);
    } else {
      standalones.push(ex);
    }
  }

  var masterKeys=Object.keys(masterMap).sort();
  var masterHTML="";
  for(i=0;i<masterKeys.length;i++){
    var key=masterKeys[i];
    masterHTML+=buildMasterGroup(key,masterMap[key].variations,masterMap[key].muscle);
  }
  var standaloneHTML="";
  for(i=0;i<standalones.length;i++) standaloneHTML+=exItemHTML(standalones[i]);

  countEl.textContent=filtered.length+" exercise"+(filtered.length!==1?"s":"")+suffix;
  list.innerHTML=masterHTML+standaloneHTML;
}

// mc-exercise-catalog.js runs synchronously above and merges custom/published
// exercises into EXERCISES before we render, so the count and list are accurate.
document.getElementById("totalCount").textContent=EXERCISES.filter(function(e){return !isConditioning(e);}).length+" exercises across all programs";
buildFilters();
renderReplaceBanner();
var _urlMuscle = _params.get('muscle');
var _urlQuery = _params.get('q');
if (_urlQuery) document.getElementById("searchBox").value = _urlQuery;
if (_urlMuscle) setFilter(_urlMuscle); else filterExercises();

</script>

<script src="mc-sw-update.js"></script><!-- replaced legacy inline SW updater: unguarded navigator.serviceWorker crash + force-reload without the mid-workout guard -->
<script>
/* ── SMART BACK NAV ── */
(function(){
  var back = sessionStorage.getItem('mc_back_to');
  if(!back) return;
  // Find all back links pointing to index/home and redirect to dashboard
  document.querySelectorAll('a').forEach(function(a){
    var href = a.getAttribute('href')||'';
    if(href === 'index.html' || href === '../' || href === '/' ||
       href.includes('index') || a.textContent.trim().startsWith('←')){
      a.href = back;
      a.addEventListener('click', function(){
        sessionStorage.removeItem('mc_back_to');
      });
    }
  });
})();
</script>
<script src="mc-nav.js"></script>
</body>
</html>
