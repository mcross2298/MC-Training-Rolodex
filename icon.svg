<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="80" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#1e0a3c"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Dumbbell icon -->
  <g fill="#d4af37">
    <!-- Left weight plate -->
    <rect x="80" y="210" width="40" height="92" rx="8"/>
    <rect x="60" y="226" width="30" height="60" rx="6"/>
    <!-- Right weight plate -->
    <rect x="392" y="210" width="40" height="92" rx="8"/>
    <rect x="422" y="226" width="30" height="60" rx="6"/>
    <!-- Bar -->
    <rect x="120" y="246" width="272" height="20" rx="6"/>
    <!-- Center knurling marks -->
    <rect x="220" y="230" width="72" height="52" rx="8"/>
  </g>
  <!-- MC text -->
  <text x="256" y="390" font-family="'Segoe UI',sans-serif" font-weight="900"
        font-size="72" fill="#d4af37" text-anchor="middle" letter-spacing="4">MC</text>
</svg>