<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workout Logs — MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;min-height:100vh;color:#fff;padding-bottom:40px;}

.topbar{display:flex;align-items:center;gap:12px;padding:20px 18px 14px;position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,#0a0a0a 80%,transparent);}
.back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#111;border:1px solid rgba(255,255,255,0.1);color:#d4af37;font-size:16px;text-decoration:none;flex-shrink:0;}
.topbar-info{flex:1;}
.topbar-title{font-size:18px;font-weight:900;letter-spacing:-0.02em;}
.topbar-sub{font-size:12px;color:#64748b;margin-top:1px;}

.hero{background:linear-gradient(135deg,#0a1628,#020b18);border-bottom:1px solid rgba(212,175,55,0.15);padding:20px 18px 22px;margin-bottom:0;}
.hero-eyebrow{font-size:11px;font-weight:900;letter-spacing:0.25em;color:#d4af37;text-transform:uppercase;margin-bottom:8px;}
.hero-title{font-size:26px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;}
.hero-sub{font-size:13px;color:#6b7280;line-height:1.5;}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.06);}
.stat{background:#0a0a0a;padding:14px 12px;text-align:center;}
.stat-num{font-size:22px;font-weight:900;color:#d4af37;letter-spacing:-0.02em;}
.stat-label{font-size:11px;font-weight:700;color:#475569;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}

/* Content */
.content{padding:20px 18px 0;}
.section-label{font-size:11px;font-weight:900;letter-spacing:0.2em;color:#475569;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent);}

/* Log cards */
.log-card{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;}
.log-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--prog-color,#d4af37);border-radius:0 2px 2px 0;}
.log-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.log-name{font-size:15px;font-weight:800;color:#fff;line-height:1.3;}
.log-date{font-size:11px;color:#475569;font-weight:600;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.log-meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.log-tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;background:rgba(255,255,255,0.05);color:#64748b;border:1px solid rgba(255,255,255,0.07);letter-spacing:0.05em;}
.log-tag.gold{background:rgba(212,175,55,0.1);color:#d4af37;border-color:rgba(212,175,55,0.25);}
.log-sets{display:flex;flex-direction:column;gap:6px;}
.set-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:#0d0d0d;border-radius:8px;}
.set-ex{font-size:12px;font-weight:700;color:#e2e8f0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.set-data{font-size:12px;color:#d4af37;font-weight:700;white-space:nowrap;}
.set-pr{font-size:11px;font-weight:900;background:rgba(212,175,55,0.15);color:#d4af37;border-radius:4px;padding:1px 5px;letter-spacing:0.06em;border:1px solid rgba(212,175,55,0.25);}
.log-duration{font-size:11px;color:#475569;margin-top:8px;display:flex;align-items:center;gap:5px;}

/* Empty state */
.empty{text-align:center;padding:48px 24px;}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-0.01em;}
.empty-sub{font-size:13px;color:#475569;line-height:1.6;margin-bottom:20px;}
.empty-btn{display:inline-block;padding:12px 24px;background:#d4af37;color:#000;border-radius:12px;font-size:14px;font-weight:900;text-decoration:none;letter-spacing:0.03em;}

/* Clear btn */
.clear-btn{
  display:block;width:100%;padding:12px;
  background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);
  border-radius:12px;color:#f87171;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:16px;letter-spacing:0.03em;
}
.clear-btn:active{background:rgba(239,68,68,0.15);}
</style>
<link rel="stylesheet" href="base.css?v=65"/>
<link rel="stylesheet" href="mc-nav.css"/>
<link rel="stylesheet" href="mc-setlog.css"/>
<link rel="stylesheet" href="mc-summary.css"/>
<script src="mc-theme.js"></script>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="back" onclick="sessionStorage.removeItem('mc_back_to')">←</a>
  <div class="topbar-info">
    <div class="topbar-title">Workout Logs</div>
    <div class="topbar-sub">Completed workouts</div>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow">📊 Training History</div>
  <h1 class="hero-title">Workout Logs</h1>
  <p class="hero-sub">Every completed workout with sets logged, weights used, and personal records.</p>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Workouts</div></div>
  <div class="stat"><div class="stat-num" id="statSets">0</div><div class="stat-label">Sets Logged</div></div>
  <div class="stat"><div class="stat-num" id="statPRs">0</div><div class="stat-label">PRs Set</div></div>
</div>
<div id="backupStatus" style="display:none;"></div>

<div class="content">
  <div id="logContent"></div>
</div>

<script>
const WL_KEY = 'mc_workout_log_v1';
const SL_KEY = 'mc_setlog_v1';

function getLogs(){
  try{ return JSON.parse(localStorage.getItem(WL_KEY)||'[]'); }catch(e){ return []; }
}

function getSetLogs(){
  try{ return JSON.parse(localStorage.getItem(SL_KEY)||'{}'); }catch(e){ return {}; }
}

const DAILY_KEY = 'mc_daily_v1';
function getDaily(){
  try{ return JSON.parse(localStorage.getItem(DAILY_KEY)||'{}'); }catch(e){ return {}; }
}
// Live per-day session tracking written by mc-summary.js as the lifter checks
// off exercises (even before "Finish Workout" is tapped).
function dailyHtml(){
  const entries = Object.values(getDaily()).sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!entries.length) return '';
  const byDate = {};
  entries.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });
  let h = '<div class="section-label">📅 Daily Sessions (live)</div>';
  Object.keys(byDate).sort().reverse().forEach(date=>{
    byDate[date].forEach(e=>{
      h += `
        <div class="log-card" style="--prog-color:#34d399">
          <div class="log-header">
            <div class="log-name">${e.program||e.pid}</div>
            <div class="log-date">${e.date}</div>
          </div>
          <div class="log-meta-row">
            <span class="log-tag">${e.doneSets} sets</span>
            <span class="log-tag">${e.doneReps} reps</span>
            <span class="log-tag gold">${e.pct}% complete</span>
          </div>
        </div>`;
    });
  });
  return h;
}

const PROG_COLORS = {
  mc:'#d4af37', pmc:'#7F77DD', stndr:'#1D9E75',
  pump:'#D85A30', gainz:'#378ADD', faint:'#E24B4A', psu:'#639922'
};

function detectProgram(pageId){
  if(pageId.startsWith('mc-s')) return {name:'MC Splits',color:'#d4af37'};
  if(pageId.startsWith('pmc-s')) return {name:'PMC',color:'#7F77DD'};
  if(pageId.includes('pump')) return {name:'Daily Pump',color:'#D85A30'};
  if(pageId.includes('gainz')||pageId.includes('lean-bulk')||pageId.includes('shred')||pageId.includes('bro-split')||pageId.includes('push-pull')) return {name:'Daily Gainz',color:'#378ADD'};
  if(pageId.includes('stndr')||pageId.includes('legacy')||pageId.includes('lets-get')) return {name:'STNDR',color:'#1D9E75'};
  if(pageId.includes('psu')) return {name:'PSU Football',color:'#639922'};
  return {name:'Workout',color:'#d4af37'};
}

function formatDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function render(){
  const logs = getLogs();
  const setLogs = getSetLogs();
  const content = document.getElementById('logContent');

  // Stats
  let totalSets = 0;
  let totalPRs = 0;
  logs.forEach(log=>{
    if(log.sets) totalSets += log.sets.length;
    if(log.prs) totalPRs += log.prs;
  });
  document.getElementById('statTotal').textContent = logs.length;
  document.getElementById('statSets').textContent = totalSets;
  document.getElementById('statPRs').textContent = totalPRs;

  const daily = dailyHtml();

  if(logs.length === 0 && !daily){
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No workouts logged yet</div>
        <div class="empty-sub">Complete a workout and tap "Finish Workout" to log it here. Your sets, weights, and PRs will be stored automatically.</div>
        <a href="dashboard.html" class="empty-btn">← Back to Dashboard</a>
      </div>`;
    return;
  }

  // Group by date
  const byDate = {};
  logs.forEach(log=>{
    const d = formatDate(log.date);
    if(!byDate[d]) byDate[d] = [];
    byDate[d].push(log);
  });

  let html = daily;
  Object.keys(byDate).reverse().forEach(date=>{
    html += `<div class="section-label">${date}</div>`;
    byDate[date].forEach(log=>{
      const prog = detectProgram(log.pageId||'');
      const setsHtml = (log.sets||[]).slice(0,4).map(s=>`
        <div class="set-row">
          <span class="set-ex">${s.name}</span>
          <span class="set-data">${s.weight?s.weight+' lb':'—'} × ${s.reps||'—'}</span>
          ${s.pr?'<span class="set-pr">PR</span>':''}
        </div>`).join('');
      const moreSets = (log.sets||[]).length > 4 ? `<div style="font-size:11px;color:#475569;padding:6px 10px;">+${log.sets.length-4} more sets</div>` : '';
      html += `
        <div class="log-card" style="--prog-color:${prog.color}">
          <div class="log-header">
            <div class="log-name">${log.workoutName||'Workout'}</div>
            <div class="log-date">${log.time||''}</div>
          </div>
          <div class="log-meta-row">
            <span class="log-tag gold">${prog.name}</span>
            <span class="log-tag">${(log.sets||[]).length} sets</span>
            ${log.duration?`<span class="log-tag">⏱ ${log.duration}</span>`:''}
            ${log.prs?`<span class="log-tag gold">🏆 ${log.prs} PR${log.prs>1?'s':''}</span>`:''}
          </div>
          <div class="log-sets">${setsHtml}${moreSets}</div>
        </div>`;
    });
  });

  if(logs.length) html += `<button class="clear-btn" onclick="clearLogs()">🗑 Clear All Workout Logs</button>`;
  content.innerHTML = html;
}

function clearLogs(){
  if(confirm('Clear all workout logs? This cannot be undone.')){
    localStorage.removeItem(WL_KEY);
    render();
  }
}

render();
</script>
<script>
/* ── SMART BACK NAV ── */
(function(){
  var back = sessionStorage.getItem('mc_back_to');
  if(!back) return;
  // Find all back links pointing to index/home and redirect to dashboard
  document.querySelectorAll('a').forEach(function(a){
    var href = a.getAttribute('href')||'';
    if(href === 'index.html' || href === '../' || href === '/' ||
       href.includes('index') || a.textContent.trim().startsWith('←')){
      a.href = back;
      a.addEventListener('click', function(){
        sessionStorage.removeItem('mc_back_to');
      });
    }
  });
})();
</script>
<script src="mc-nav.js"></script>
<script src="mc-setlog.js"></script>
<script src="mc-summary.js"></script>
<script src="mc-supabase.js"></script>
<script src="mc-sync.js"></script>
<script src="mc-backup-status.js"></script>
</body>
</html>
