<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Collections — MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;color:#e2e8f0;padding-bottom:120px;}
.header{background:linear-gradient(135deg,#3b0764,#140520);padding:60px 20px 22px;border-bottom:1px solid rgba(168,85,247,0.25);position:relative;}
.back-link{position:absolute;top:18px;left:18px;color:#d8b4fe;text-decoration:none;font-size:13px;font-weight:700;background:rgba(168,85,247,0.14);padding:6px 14px;border-radius:20px;border:1px solid rgba(168,85,247,0.4);}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#d8b4fe;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:28px;font-weight:900;color:#fff;margin-bottom:10px;}
.subtitle{font-size:13px;color:#94a3b8;font-weight:600;line-height:1.5;}
.content{max-width:680px;margin:0 auto;padding:18px 16px 0;}
.modules{display:flex;flex-direction:column;gap:16px;}
.module{border-radius:20px;overflow:hidden;cursor:pointer;user-select:none;background:linear-gradient(135deg,#1e0a33,#140520);border:1px solid rgba(168,85,247,0.22);box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.module-header{display:flex;align-items:center;padding:20px 22px;gap:16px;}
.module-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.25);}
.module-label{flex:1;}
.module-tag{font-size:11px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:4px;color:#d8b4fe;}
.module-name{font-size:24px;font-weight:900;letter-spacing:0.02em;line-height:1;color:#fff;}
.module-count{font-size:11px;font-weight:500;color:#94a3b8;margin-top:5px;}
.chevron{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:transform 0.25s;color:#d8b4fe;background:rgba(168,85,247,0.12);}
.module.open .chevron{transform:rotate(90deg);}
.drill{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);}
.module.open .drill{max-height:4000px;}
.drill-inner{padding:0 18px 18px;}
.drill-divider{height:1px;margin-bottom:14px;background:rgba(168,85,247,0.25);}
.workout-row{display:flex;align-items:center;padding:14px 14px;border-radius:12px;margin-bottom:8px;text-decoration:none;color:inherit;gap:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);}
.workout-row:last-child{margin-bottom:0;}
.row-emoji{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
.row-text{flex:1;min-width:0;}
.row-name{font-size:15px;font-weight:800;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-detail{font-size:11px;font-weight:500;margin-top:2px;color:#94a3b8;}
.row-badge{font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:4px 9px;border-radius:6px;white-space:nowrap;background:rgba(168,85,247,0.18);color:#d8b4fe;border:1px solid rgba(168,85,247,0.35);}
.row-arrow{font-size:13px;color:#64748b;}
.bonus-empty{text-align:center;color:#64748b;font-size:13px;font-weight:600;line-height:1.6;padding:50px 20px;}
.bonus-cta{display:inline-block;margin-top:6px;padding:11px 20px;border-radius:12px;background:linear-gradient(90deg,#c084fc,#a855f7);color:#1a0533;font-size:14px;font-weight:900;text-decoration:none;}
/* collection cards (list mode) */
.col-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;margin-bottom:10px;text-decoration:none;color:inherit;background:#160a26;border:1px solid rgba(168,85,247,0.2);}
.col-card .ci{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(168,85,247,0.14);flex-shrink:0;}
.col-card .cn{flex:1;}
.col-card .cnm{font-size:16px;font-weight:900;color:#fff;}
.col-card .cmeta{font-size:11px;color:#94a3b8;font-weight:600;margin-top:2px;}
.col-card .carr{color:#64748b;}
/* new-collection form */
.sec-lbl{font-size:11px;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;color:#94a3b8;margin:22px 0 10px;}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#f1f5f9;font-size:15px;font-weight:700;font-family:inherit;outline:none;}
.pick-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.pick{width:44px;height:44px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;}
.pick.sel{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.35);}
.pick .sw{width:22px;height:22px;border-radius:50%;}
.mk-btn{width:100%;margin-top:16px;padding:14px;border-radius:12px;border:none;background:linear-gradient(90deg,#c084fc,#a855f7);color:#1a0533;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;}
.mk-btn:disabled{opacity:0.4;}
</style>
<link rel="stylesheet" href="base.css?v=65"/>
<link rel="stylesheet" href="mc-nav.css"/>
<script src="mc-theme.js"></script>
</head>
<body>
<div class="header">
  <a href="dashboard.html" class="back-link">&larr; Dashboard</a>
  <div class="header-inner">
    <div class="eyebrow">🗂️ MC Training</div>
    <div class="title" id="hTitle">Collections</div>
    <div class="subtitle" id="hSub">Group standalone workouts into folders — by goal, body part, or anything you like.</div>
  </div>
</div>

<div class="content">
  <div id="single" style="display:none;"><div class="modules" id="colModules"></div></div>
  <div id="list" style="display:none;">
    <div id="colList"></div>
    <div class="sec-lbl">New collection</div>
    <input class="inp" id="cName" placeholder="Collection name (e.g. Quick Finishers)" maxlength="36">
    <div class="sec-lbl" style="margin-top:14px;">Icon</div>
    <div class="pick-row" id="cIcons"></div>
    <div class="sec-lbl" style="margin-top:14px;">Color</div>
    <div class="pick-row" id="cColors"></div>
    <button class="mk-btn" id="mkBtn" disabled>＋ Create Collection</button>
  </div>
</div>

<script>
  function toggle(el){
    var wasOpen=el.classList.contains('open');
    document.querySelectorAll('.module.open').forEach(function(m){m.classList.remove('open');});
    if(!wasOpen)el.classList.add('open');
  }
</script>
<script src="mc-collections.js"></script>
<script>
(function(){
  var id=new URLSearchParams(location.search).get('id');
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  if(id){
    document.getElementById('single').style.display='';
    var c=MC_COLLECTIONS.get(id);
    if(c){ document.getElementById('hTitle').textContent=c.name; document.getElementById('hSub').textContent='Workouts you grouped into this collection.'; }
    MC_COLLECTIONS.renderLanding(document.getElementById('colModules'), id);
    return;
  }

  // list + create mode
  document.getElementById('list').style.display='';
  var ICONS=['🗂️','🔥','⚡','💪','🏃','🧊','🎯','🌙','☀️','🏆'];
  var COLORS=['#a855f7','#e11d48','#f97316','#14b8a6','#38bdf8','#34d399','#eab308','#f43f5e'];
  var pickIcon=ICONS[0], pickColor=COLORS[0];

  function renderList(){
    var el=document.getElementById('colList');
    var cols=MC_COLLECTIONS.getAll();
    if(!cols.length){ el.innerHTML='<div class="bonus-empty" style="padding:24px 10px;">No collections yet — create your first below. 👇</div>'; return; }
    el.innerHTML=cols.map(function(c){
      var n=MC_COLLECTIONS.workoutsIn(c.id).length;
      return '<a class="col-card" href="collections.html?id='+encodeURIComponent(c.id)+'">'+
        '<div class="ci" style="background:'+(c.color||'#a855f7')+'22;">'+(c.icon||'🗂️')+'</div>'+
        '<div class="cn"><div class="cnm">'+esc(c.name)+'</div>'+
        '<div class="cmeta">'+n+' workout'+(n!==1?'s':'')+'</div></div>'+
        '<div class="carr">→</div></a>';
    }).join('');
  }
  function renderPicks(){
    document.getElementById('cIcons').innerHTML=ICONS.map(function(i){
      return '<div class="pick'+(i===pickIcon?' sel':'')+'" data-i="'+i+'">'+i+'</div>';
    }).join('');
    document.getElementById('cColors').innerHTML=COLORS.map(function(c){
      return '<div class="pick'+(c===pickColor?' sel':'')+'" data-c="'+c+'"><span class="sw" style="background:'+c+';"></span></div>';
    }).join('');
  }
  document.getElementById('cIcons').addEventListener('click',function(e){var p=e.target.closest('[data-i]');if(!p)return;pickIcon=p.dataset.i;renderPicks();});
  document.getElementById('cColors').addEventListener('click',function(e){var p=e.target.closest('[data-c]');if(!p)return;pickColor=p.dataset.c;renderPicks();});
  var nameInp=document.getElementById('cName'), mkBtn=document.getElementById('mkBtn');
  nameInp.addEventListener('input',function(){ mkBtn.disabled=!nameInp.value.trim(); });
  mkBtn.addEventListener('click',function(){
    var nm=nameInp.value.trim(); if(!nm)return;
    MC_COLLECTIONS.save({ name:nm, icon:pickIcon, color:pickColor });
    nameInp.value=''; mkBtn.disabled=true; renderList();
    window.scrollTo({top:0,behavior:'smooth'});
  });

  renderPicks();
  renderList();
})();
</script>
<script src="mc-nav.js"></script>
</body>
</html>
