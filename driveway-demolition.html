<!DOCTYPE html>
<html lang="en">
<head>

<title>Driveway Demolition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;padding-bottom:40px;}
.app{background:linear-gradient(135deg,#3f1408 0%,#9a3412 50%,#3f1408 100%);min-height:100vh;}
.back-link{position:absolute;top:18px;left:18px;color:#fdba74;text-decoration:none;font-size:13px;font-weight:600;background:rgba(234,88,12,0.22);padding:6px 12px;border-radius:20px;border:1px solid rgba(234,88,12,0.5);z-index:10;}
.back-link:active{background:rgba(234,88,12,0.35);}
.header{background:linear-gradient(90deg,#9a3412,#3f1408);padding:60px 20px 22px;border-bottom:1px solid rgba(255,255,255,0.08);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.22em;color:#fdba74;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:30px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-0.02em;}
.schedule{display:inline-block;background:rgba(234,88,12,0.22);border:1px solid rgba(234,88,12,0.5);border-radius:6px;padding:5px 12px;font-size:12px;color:#fed7aa;font-weight:700;}

/* sticky day tabs */
.tabs-bar{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 20px;position:sticky;top:0;z-index:30;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;}
.tab{padding:13px 18px;border:none;cursor:pointer;font-weight:800;font-size:13px;background:transparent;color:#92857a;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.tab.active{color:#fb923c;border-bottom-color:#fb923c;}

.content{max-width:680px;margin:22px auto 0;padding:0 16px;}
.section-card{background:#fff;border-radius:16px;padding:0;margin-bottom:18px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow:hidden;}
.section-head{background:linear-gradient(135deg,#9a3412,#7c2d12);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.section-eyebrow{font-size:11px;font-weight:800;letter-spacing:0.2em;color:#fed7aa;text-transform:uppercase;margin-bottom:4px;}
.section-title{font-size:20px;font-weight:900;letter-spacing:-0.01em;}
.head-pill{font-size:11px;font-weight:900;letter-spacing:0.08em;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 10px;border-radius:20px;white-space:nowrap;}
.section-body{padding:18px 20px;}
.rules-list{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.rules-list li{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#374151;line-height:1.5;}
.rules-list li::before{content:"▸";color:#ea580c;font-weight:900;font-size:14px;flex-shrink:0;}
.rules-list strong{color:#9a3412;}
.big-number{display:inline-block;background:linear-gradient(135deg,#ea580c,#9a3412);color:#fff;font-size:32px;font-weight:900;padding:12px 22px;border-radius:12px;letter-spacing:-0.02em;box-shadow:0 4px 20px rgba(234,88,12,0.15);}
.big-number .unit{font-size:13px;font-weight:700;opacity:0.9;margin-left:8px;letter-spacing:0.06em;}
.target-row{display:flex;gap:10px;align-items:center;margin-top:14px;padding:10px 14px;background:#fff7ed;border-radius:8px;border:1px solid #fed7aa;}
.target-label{font-size:11px;font-weight:800;color:#9a3412;letter-spacing:0.12em;text-transform:uppercase;}
.target-value{font-size:18px;font-weight:900;color:#7c2d12;}
.optional-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border-left:3px solid #f59e0b;padding:12px 14px;border-radius:8px;margin-top:14px;font-size:12px;color:#78350f;line-height:1.5;}
.optional-banner strong{color:#92400e;}

/* primary action buttons */
.action-btn{width:100%;margin-top:16px;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:900;letter-spacing:0.04em;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;color:#fff;background:linear-gradient(135deg,#ea580c,#9a3412);box-shadow:0 4px 16px rgba(234,88,12,0.3);}
.action-btn:active{transform:scale(0.99);}
.action-btn.ghost{background:#fff7ed;color:#9a3412;border:1.5px solid #fed7aa;box-shadow:none;}

/* ── LADDER ACTIVE TRACKER ── */
.ladder-active{text-align:center;}
.set-indicator{font-size:13px;font-weight:900;letter-spacing:0.16em;color:#9a3412;text-transform:uppercase;margin-bottom:6px;}
.set-indicator b{color:#ea580c;font-size:16px;}
.target-big{font-size:40px;font-weight:900;color:#7c2d12;letter-spacing:-0.02em;line-height:1.1;margin-bottom:4px;}
.target-big b{color:#ea580c;}
.target-sub{font-size:12px;font-weight:700;color:#9a3412;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px;}
.ladder-prog{height:8px;background:#ffedd5;border-radius:4px;overflow:hidden;margin:14px 0 4px;}
.ladder-prog-fill{height:100%;background:linear-gradient(90deg,#fb923c,#ea580c);border-radius:4px;transition:width .35s ease;}
.ladder-prog-cap{font-size:11px;font-weight:800;color:#9a3412;letter-spacing:0.04em;}
.complete-set-btn{width:100%;padding:18px;border-radius:14px;border:none;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-size:17px;font-weight:900;letter-spacing:0.03em;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px rgba(22,163,74,0.3);}
.complete-set-btn:active{transform:scale(0.99);}
.fail-toggle{width:100%;margin-top:10px;padding:12px;border-radius:11px;border:1.5px solid #fecaca;background:#fff;color:#dc2626;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.fail-toggle.on{background:#fee2e2;border-color:#dc2626;color:#991b1b;}

/* rest bar — the morphed Complete Set button */
.rest-morph{width:100%;border-radius:14px;overflow:hidden;position:relative;height:64px;background:#ffedd5;border:1px solid #fed7aa;display:flex;align-items:center;justify-content:center;}
.rest-morph-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(135deg,#fb923c,#ea580c);transition:width 1s linear;z-index:1;}
.rest-morph-txt{position:relative;z-index:2;font-size:15px;font-weight:900;color:#7c2d12;letter-spacing:0.04em;text-shadow:0 1px 2px rgba(255,255,255,0.4);}
.rest-morph-txt b{font-size:20px;}
.next-up{font-size:13px;font-weight:800;color:#9a3412;margin-top:12px;letter-spacing:0.02em;}
.next-up b{color:#ea580c;}
.knee-note{background:#fef2f2;border-left:3px solid #dc2626;padding:11px 13px;border-radius:8px;margin-top:14px;font-size:12px;color:#991b1b;line-height:1.5;font-weight:600;text-align:left;}
.knee-note strong{color:#7f1d1d;}

/* ladder complete + finisher */
.ladder-done-banner{text-align:center;background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:1px solid #86efac;border-radius:12px;padding:16px;margin-bottom:14px;}
.ladder-done-banner .ld-title{font-size:17px;font-weight:900;color:#15803d;letter-spacing:-0.01em;}
.ladder-done-banner .ld-sub{font-size:12px;font-weight:700;color:#166534;margin-top:3px;}
.fin-row{display:flex;align-items:center;gap:12px;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:12px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fin-row.on{background:#dcfce7;border-color:#16a34a;}
.fin-check{width:30px;height:30px;border-radius:8px;border:2px solid #fdba74;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#16a34a;flex-shrink:0;}
.fin-row.on .fin-check{background:#16a34a;border-color:#16a34a;color:#fff;}
.fin-title{font-size:14px;font-weight:900;color:#7c2d12;}
.fin-sub{font-size:11px;font-weight:700;color:#9a3412;margin-top:2px;}
.fin-badge{font-size:14px;font-weight:900;color:#ea580c;flex-shrink:0;margin-left:auto;}

/* ── CORE DAY BLOCK + RUNNER ── */
.day-block{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.day-block-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.day-pill{background:#9a3412;color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:5px;letter-spacing:0.08em;}
.ex-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ex-list li{display:flex;gap:10px;align-items:center;font-size:13px;color:#374151;}
.ex-list li.cur{color:#9a3412;font-weight:900;}
.ex-list li.done-ex{color:#16a34a;}
.ex-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#fff;border:1.5px solid #fed7aa;border-radius:50%;font-size:11px;font-weight:900;color:#9a3412;flex-shrink:0;}
.ex-list li.cur .ex-num{background:#ea580c;color:#fff;border-color:#ea580c;}
.ex-list li.done-ex .ex-num{background:#16a34a;color:#fff;border-color:#16a34a;}
.ex-text{font-weight:600;}

.circuit-live{text-align:center;padding:6px 2px;}
.circuit-tag{font-size:12px;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;}
.circuit-tag.work{color:#ea580c;}
.circuit-tag.rest{color:#d97706;}
.ex-name-big{font-size:26px;font-weight:900;color:#7c2d12;letter-spacing:-0.01em;margin-bottom:10px;line-height:1.15;}
.timer-big{font-size:62px;font-weight:900;color:#ea580c;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1;margin-bottom:12px;}
.timer-big.rest{color:#d97706;}
.timer-bar{height:10px;background:#ffedd5;border-radius:5px;overflow:hidden;margin-bottom:16px;}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,#fb923c,#ea580c);border-radius:5px;transition:width .25s linear;}
.timer-bar-fill.rest{background:linear-gradient(90deg,#fcd34d,#d97706);}
.circuit-ctrls{display:flex;gap:8px;}
.circuit-ctrls button{flex:1;padding:12px;border-radius:11px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.ctrl-skip{background:#fff7ed;color:#9a3412;border:1.5px solid #fed7aa;}
.ctrl-stop{background:#fee2e2;color:#dc2626;border:1.5px solid #fecaca;}
.round-dots{display:flex;gap:6px;justify-content:center;margin-top:12px;}
.round-dot{width:9px;height:9px;border-radius:50%;background:#ffedd5;border:1px solid #fed7aa;}
.round-dot.on{background:#ea580c;border-color:#ea580c;}

/* ── WORKOUT TOTAL ── */
.total-card{background:linear-gradient(135deg,#ea580c,#7c2d12);border-radius:16px;padding:20px;text-align:center;margin-top:4px;box-shadow:0 4px 20px rgba(234,88,12,0.15);}
.total-label{font-size:11px;font-weight:800;letter-spacing:0.2em;color:#fed7aa;text-transform:uppercase;margin-bottom:6px;}
.total-value{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.3;}

/* ── SUMMARY ── */
.sum-section{margin:28px auto 0;max-width:680px;padding:0 16px 8px;}
.sum-hd{font-size:11px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#fb923c;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sum-card{border-radius:14px;padding:16px;background:#0f0f0f;border:1px solid rgba(234,88,12,0.25);}
.sum-sub{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;color:#fb923c;}
.sum-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(234,88,12,0.12);}
.sum-row:last-of-type{border-bottom:none;}
.sum-ico{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
.sum-nm{flex:1;font-size:12px;font-weight:600;color:#e2e8f0;}
.sum-dt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.sum-st{font-size:11px;font-weight:900;color:#fb923c;}
.sum-rp{font-size:11px;font-weight:600;color:#94a3b8;}
.sum-div{height:1px;margin:14px 0;background:rgba(234,88,12,0.18);}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sum-tot{border-radius:10px;padding:12px 8px;text-align:center;background:rgba(234,88,12,0.1);border:1px solid rgba(234,88,12,0.2);}
.sum-tv{font-size:18px;font-weight:900;letter-spacing:-0.01em;color:#fff;font-variant-numeric:tabular-nums;}
.sum-tl{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;color:#fb923c;}

/* ── FINISH-WORKOUT ── */
.fw-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(10,10,10,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.07);z-index:40;display:flex;gap:10px;align-items:center;}
.fw-btn{flex:1;padding:13px;background:#d4af37;border:none;border-radius:12px;color:#000;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.fw-btn:active{opacity:0.85;transform:scale(0.98);}
.fw-progress{font-size:11px;font-weight:700;color:#94a3b8;white-space:nowrap;letter-spacing:0.04em;}
.fw-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-end;padding:16px;z-index:60;}
.fw-modal-overlay.open{display:flex;}
.fw-modal{width:100%;max-width:648px;margin:0 auto;background:#0e0e0e;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px 20px 20px;}
.fw-modal-title{font-size:20px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;color:#fff;}
.fw-modal-sub{font-size:13px;color:#64748b;margin-bottom:18px;line-height:1.5;}
.fw-summary{background:#111;border-radius:12px;padding:14px;margin-bottom:16px;}
.fw-summary-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;}
.fw-summary-row:last-child{border-bottom:none;}
.fw-summary-label{color:#64748b;font-weight:600;}
.fw-summary-val{color:#fff;font-weight:800;}
.fw-modal-btns{display:flex;gap:10px;}
.fw-cancel{flex:1;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.fw-confirm{flex:2;padding:12px;background:#d4af37;border:none;border-radius:12px;color:#000;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:0.02em;}
.fw-auto-banner{position:fixed;top:0;left:0;right:0;background:rgba(52,211,153,0.12);border-bottom:1px solid rgba(52,211,153,0.3);padding:12px 16px;text-align:center;font-size:13px;font-weight:800;color:#34d399;z-index:50;display:none;letter-spacing:0.02em;cursor:pointer;}
.fw-auto-banner.show{display:block;}
.swap-badge{font-size:10px;font-weight:900;color:#fff;background:#ea580c;border-radius:8px;padding:1px 6px;vertical-align:middle;}
</style>

<div class="app">
  <div class="header">
    <a href="cat-faint.html" class="back-link">← Back</a>
    <div class="header-inner">
      <div class="eyebrow">Pushups + Core</div>

      <div class="total-value" id="totalValue">—</div>
    </div>
  </div>
</div>

<div class="sum-section">
  <div class="sum-hd">📊 Workout Summary
    <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(251,146,60,0.35),transparent);display:block;margin-left:8px;"></span>
  </div>
  <div class="sum-card">
    <div class="sum-sub">Pushups · Core · Daily Beatdown</div>
    <div class="sum-row"><span class="sum-ico">💪</span><span class="sum-nm">1–18 Pushup Ladder</span><div class="sum-dt"><span class="sum-st" id="sumLadSt">0 / 18 sets</span><span class="sum-rp" id="sumLadRp">0 reps</span></div></div>
    <div class="sum-row"><span class="sum-ico">🔥</span><span class="sum-nm" id="sumCoreNm">Core Circuit</span><div class="sum-dt"><span class="sum-st" id="sumCoreSt">0 / 6 intervals</span><span class="sum-rp" id="sumCoreRp">2 rounds · 3 exercises</span></div></div>
    <div class="sum-div"></div>
    <div class="sum-grid">
      <div class="sum-tot"><div class="sum-tv" id="gPush">0</div><div class="sum-tl">Pushups / 200</div></div>
      <div class="sum-tot"><div class="sum-tv" id="gSets">0/18</div><div class="sum-tl">Ladder Sets</div></div>
      <div class="sum-tot"><div class="sum-tv" id="gTime">0:00</div><div class="sum-tl">Active Time</div></div>
    </div>
  </div>

<script>
/* ════════════════════════════════════════════════════════════
   DRIVEWAY DEMOLITION — interactive, state-driven tracker
   3 day tabs · shared pushup ladder · per-day core circuit runner
   ════════════════════════════════════════════════════════════ */
var PID  = location.pathname.split('/').pop().replace('.html','') || 'driveway-demolition';
var SKEY = 'driveway_state_v1';

var DAYS = {
  d12:{label:'Days 1-2', ex:['Heels to Heaven','Flutter Kicks','6" / 45 / 90']},
  d34:{label:'Days 3-4', ex:['Mountain Climbers','Planks','Around the Worlds']},
  d56:{label:'Days 5-6', ex:['USA Twists','In and Outs','Bicycle Kicks']}
};
var DAY_ORDER = ['d12','d34','d56'];

var DEFAULT_STATE = {
  activeTab:'d12',
  ladder:{started:false, set:1, failedAt:null, finisher:false},
  core:{d12:{step:0}, d34:{step:0}, d56:{step:0}},
  elapsedMs:0, timeStarted:false
};
var S = loadState();
var ladderResting = false; // transient UI flag (not persisted)

function loadState(){
  try{
    var raw=JSON.parse(localStorage.getItem(SKEY)||'null');
    if(raw && raw.ladder && raw.core) return raw;
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function persist(){ try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} }

function sumTo(k){ return k>0 ? k*(k+1)/2 : 0; }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtClock(secs){ secs=Math.max(0,secs); return Math.floor(secs/60)+':'+pad(secs%60); }
function swapKey(g,i){ return 'core-'+g+'-'+i; }
function exName(g,i){ var def=DAYS[g].ex[i]; return window.MCSwap?MCSwap.name(swapKey(g,i),def):def; }
function exBadge(g,i){ return (window.MCSwap&&MCSwap.isSwapped(swapKey(g,i)))?' <span class="swap-badge">⇄</span>':''; }
function refreshSwapMovements(){
  var g=S.activeTab;
  window.MC_SWAP_MOVEMENTS=DAYS[g].ex.map(function(nm,i){ return {key:swapKey(g,i),base:nm,def:nm}; });
}

function buzz(){
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(function(t,i){
      var osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=i===2?880:660;osc.type='sine';
      gain.gain.setValueAtTime(0.4,ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.25);
    });
  }catch(e){}
}

/* ════════ DERIVED METRICS ════════ */
function metrics(){
  var lad=S.ladder, failed=lad.failedAt!==null;
  var setsDone = failed ? 18 : Math.min(Math.max(lad.set-1,0),18);
  var ladderReps = failed ? 171 : sumTo(setsDone);
  var ladderComplete = failed || lad.set>18;
  var totalPushups = Math.min(200, ladderReps + (lad.finisher?29:0));
  var g=S.activeTab, step=S.core[g].step;
  return {failed:failed,setsDone:setsDone,ladderReps:ladderReps,ladderComplete:ladderComplete,
    totalPushups:totalPushups,coreStep:step,coreDone:step>=6,
    elapsed:Math.floor(S.elapsedMs/1000)};
}

/* ════════ GLOBAL ELAPSED TIME ════════ */
var GT = {
  iv:null, since:0, saveCtr:0,
  start:function(){ if(!S.timeStarted){ S.timeStarted=true; persist(); } this.resume(); },
  resume:function(){
    if(this.iv) return;
    this.since=Date.now();
    var self=this;
    this.iv=setInterval(function(){
      S.elapsedMs += Date.now()-self.since; self.since=Date.now();
      renderSummary();
      if(++self.saveCtr%5===0) persist();
    },1000);
  }
};

/* ════════ TABS ════════ */
function renderTabs(){
  document.getElementById('tabs').innerHTML = DAY_ORDER.map(function(g){
    return '<button class="tab'+(S.activeTab===g?' active':'')+'" onclick="switchTab(\''+g+'\')">'+DAYS[g].label+'</button>';
  }).join('');
}
function switchTab(g){
  if(S.activeTab===g) return;
  CORE.stop(true);          // pause any running circuit (step is preserved)
  S.activeTab=g; persist();
  refreshSwapMovements();
  renderTabs(); renderCore(); renderSummary();
}

/* ════════ PUSHUP LADDER (shared across tabs) ════════ */
function renderLadder(){
  var el=document.getElementById('ladderSection');
  var m=metrics(), lad=S.ladder;

  // — intro state —
  if(!lad.started){
    el.innerHTML =
      headHTML('The Challenge','1–18 Pushup Ladder','SHARED')+
      '<div class="section-body">'+
        '<span class="big-number">171<span class="unit">TOTAL REPS</span></span>'+
        '<ul class="rules-list" style="margin-top:16px">'+
          '<li><strong>18 sets total.</strong> Set 1 = 1 rep, Set 2 = 2 reps, all the way to Set 18 = 18 reps.</li>'+
          '<li><strong>15 seconds rest</strong> between sets.</li>'+
          '<li>When you reach failure, complete remaining sets with <strong>knee pushups until collapse.</strong></li>'+
          '<li>Target goal: <strong>execute all 171 pushups</strong> (sets 1–18), then <strong>+29 finisher</strong> to hit 200.</li>'+
        '</ul>'+
        '<div class="target-row"><div><div class="target-label">Current Daily Target</div><div class="target-value">150 Pushups</div></div></div>'+
        '<div class="optional-banner"><strong>Optional:</strong> 5 min jump rope before pushups and after core.</div>'+
        '<button class="action-btn" onclick="startLadder()">▶ Start Ladder</button>'+
      '</div>';
    return;
  }

  // — complete state (finished all 18 OR hit failure) —
  if(m.ladderComplete){
    el.innerHTML =
      headHTML('The Challenge','1–18 Pushup Ladder','DONE')+
      '<div class="section-body">'+
        '<div class="ladder-done-banner">'+
          '<div class="ld-title">🏆 Ladder Complete — '+m.ladderReps+' pushups</div>'+
          '<div class="ld-sub">'+(m.failed?'Sets '+lad.failedAt+'–18 finished on knees (auto-credited).':'All 18 sets cleared.')+'</div>'+
        '</div>'+
        finisherHTML(lad.finisher, m.totalPushups)+
        '<button class="action-btn ghost" style="margin-top:14px" onclick="resetLadder()">↺ Restart Ladder</button>'+
      '</div>';
    return;
  }

  // — active state —
  var setN=lad.set, prog=Math.round((m.setsDone/18)*100);
  var body;
  if(ladderResting && setN<=18){
    body =
      '<div class="set-indicator">RESTING · 15 SEC</div>'+
      '<div class="ladder-prog"><div class="ladder-prog-fill" style="width:'+prog+'%"></div></div>'+
      '<div class="ladder-prog-cap">'+m.setsDone+' / 18 sets · '+m.ladderReps+' reps</div>'+
      '<div class="rest-morph" style="margin-top:14px">'+
        '<div class="rest-morph-fill" id="ladRestBar" style="width:100%"></div>'+
        '<div class="rest-morph-txt">REST <b id="ladRestTime">15</b>s</div>'+
      '</div>'+
      '<div class="next-up">Next up: Set <b>'+setN+'</b> ('+setN+' Reps)</div>'+
      '<button class="fail-toggle" style="margin-top:12px" onclick="skipRest()">⏭ Skip Rest</button>';
  } else {
    body =
      '<div class="set-indicator">SET <b>'+setN+'</b> OF 18</div>'+
      '<div class="target-big">Target: <b>'+setN+'</b></div>'+
      '<div class="target-sub">'+setN+' '+(setN===1?'Rep':'Reps')+'</div>'+
      '<div class="ladder-prog"><div class="ladder-prog-fill" style="width:'+prog+'%"></div></div>'+
      '<div class="ladder-prog-cap">'+m.setsDone+' / 18 sets · '+m.ladderReps+' reps so far</div>'+
      '<button class="complete-set-btn" style="margin-top:16px" onclick="completeSet()">✓ Complete Set '+setN+'</button>'+
      '<button class="fail-toggle'+(m.failed?' on':'')+'" onclick="toggleFailure()">⚠ Hit Failure — switch to knee pushups</button>'+
      (m.failed?'<div class="knee-note"><strong>Failure logged.</strong> Remaining sets count as knee pushups until collapse — full ladder reps auto-credited.</div>':'');
  }

  el.innerHTML =
    headHTML('The Challenge','1–18 Pushup Ladder','SET '+setN+'/18')+
    '<div class="section-body"><div class="ladder-active">'+body+'</div></div>';
}

function headHTML(eyebrow,title,pill){
  return '<div class="section-head"><div><div class="section-eyebrow">'+eyebrow+'</div>'+
    '<div class="section-title">'+title+'</div></div>'+(pill?'<span class="head-pill">'+pill+'</span>':'')+'</div>';
}
function finisherHTML(on,total){
  return '<div class="fin-row'+(on?' on':'')+'" onclick="toggleFinisher()">'+
    '<div class="fin-check">'+(on?'✓':'')+'</div>'+
    '<div><div class="fin-title">Additional 29 Finisher Pushups</div>'+
      '<div class="fin-sub">171 + 29 = 200 · hits the 200 pushup milestone</div></div>'+
    '<span class="fin-badge">'+total+'/200</span></div>';
}

function startLadder(){ S.ladder.started=true; GT.start(); persist(); renderLadder(); renderSummary(); }
function resetLadder(){ S.ladder.set=1; S.ladder.failedAt=null; S.ladder.finisher=false; ladderResting=false; persist(); renderLadder(); renderSummary(); }

function completeSet(){
  var setN=S.ladder.set;
  if(setN<18){
    S.ladder.set=setN+1;       // advance immediately (reload-safe credit)
    ladderResting=true;
    persist(); renderLadder(); renderSummary();
    LADDER.startRest();
  } else {                     // completed set 18
    S.ladder.set=19;
    ladderResting=false;
    persist(); renderLadder(); renderSummary();
    buzz();
  }
}
function skipRest(){ LADDER.stopRest(); ladderResting=false; renderLadder(); renderSummary(); }
function toggleFailure(){
  if(S.ladder.failedAt!==null){ S.ladder.failedAt=null; }
  else { S.ladder.failedAt=S.ladder.set; ladderResting=false; LADDER.stopRest(); GT.start(); buzz(); }
  persist(); renderLadder(); renderSummary();
}
function toggleFinisher(){ S.ladder.finisher=!S.ladder.finisher; persist(); renderLadder(); renderSummary(); }

/* 15-second ladder rest (drains the morph bar) */
var LADDER = {
  iv:null, endAt:0,
  startRest:function(){
    GT.start();
    this.stopRest();
    this.endAt=Date.now()+15000;
    var self=this;
    this.iv=setInterval(function(){
      var rem=Math.ceil((self.endAt-Date.now())/1000);
      var t=document.getElementById('ladRestTime'), b=document.getElementById('ladRestBar');
      if(rem>0){ if(t)t.textContent=rem; if(b)b.style.width=(rem/15*100)+'%'; }
      else { self.stopRest(); buzz(); ladderResting=false; renderLadder(); renderSummary(); }
    },250);
  },
  stopRest:function(){ if(this.iv){ clearInterval(this.iv); this.iv=null; } }
};

/* ════════ CORE CIRCUIT RUNNER ════════ */
var CORE = {
  iv:null, group:null, phase:'idle', endAt:0,
  EX:60, REST:15, CIRC:60,

  _begin:function(group, phase, secs){
    this.group=group; this.phase=phase; this.endAt=Date.now()+secs*1000;
    renderCore();
    this._run(secs);
  },
  _run:function(total){
    if(this.iv){ clearInterval(this.iv); this.iv=null; }
    var self=this;
    this.iv=setInterval(function(){
      var rem=Math.ceil((self.endAt-Date.now())/1000);
      if(rem>0){ self._paint(rem,total); }
      else { clearInterval(self.iv); self.iv=null; buzz(); self._next(); }
    },200);
    this._paint(Math.ceil((this.endAt-Date.now())/1000),total);
  },
  _paint:function(rem,total){
    var t=document.getElementById('coreTime'); if(t)t.textContent=fmtClock(rem);
    var b=document.getElementById('coreBar'); if(b)b.style.width=Math.max(0,(rem/total*100))+'%';
  },
  startCircuit:function(group){ GT.start(); this._begin(group,'exercise',this.EX); },
  _next:function(){
    var g=this.group;
    if(this.phase==='exercise'){
      S.core[g].step++; persist(); renderSummary();
      var step=S.core[g].step;
      if(step>=6){ this.phase='done'; this.iv=null; renderCore(); renderSummary(); return; }
      if(step===3){ this._begin(g,'circuitRest',this.CIRC); return; }
      this._begin(g,'rest',this.REST); return;
    }
    if(this.phase==='rest'){ this._begin(g,'exercise',this.EX); return; }
    if(this.phase==='circuitRest'){ this.phase='roundready'; this.iv=null; renderCore(); return; }
  },
  skip:function(){ if(this.iv){ clearInterval(this.iv); this.iv=null; } this._next(); },
  stop:function(silent){
    if(this.iv){ clearInterval(this.iv); this.iv=null; }
    this.phase='idle';                 // always reset so a paused runner never shows a frozen timer
    if(!silent){ renderCore(); renderSummary(); }
  }
};

function renderCore(){
  var el=document.getElementById('coreSection');
  var g=S.activeTab, day=DAYS[g], step=S.core[g].step;
  var live = (CORE.group===g && (CORE.phase==='exercise'||CORE.phase==='rest'||CORE.phase==='circuitRest'));
  var roundReady = (CORE.group===g && CORE.phase==='roundready');
  var done = step>=6;

  var inner;
  if(live){
    inner = coreLiveHTML(g, day);
  } else if(done){
    inner =
      '<div class="circuit-live">'+
        '<div class="ex-name-big" style="color:#16a34a">✅ Circuit Complete</div>'+
        '<div class="circuit-tag work">2 ROUNDS · 6 INTERVALS DONE</div>'+
        '<button class="action-btn ghost" onclick="resetCore()">↺ Restart Circuit</button>'+
      '</div>';
  } else {
    // idle / continue / start round 2
    var label, sub;
    if(step===0){ label='▶ Start Circuit'; sub='Round 1 · '+exName(g,0); }
    else if(step===3 || roundReady){ label='▶ Start Round 2'; sub='Round 2 · '+exName(g,0); }
    else { var ei=step%3; label='▶ Continue Circuit'; sub='Round '+(step<3?1:2)+' · Next: '+exName(g,ei); }
    inner =
      '<div class="day-block">'+
        '<div class="day-block-head"><span class="day-pill">'+day.label.toUpperCase()+'</span>'+
          '<span style="font-size:11px;font-weight:800;color:#9a3412;">2 rounds · 1 min each · 15s rest</span></div>'+
        '<ul class="ex-list">'+ day.ex.map(function(name,i){
            var cls = (step%3===i && step<6) ? 'cur' : '';
            return '<li class="'+cls+'"><span class="ex-num">'+(i+1)+'</span><span class="ex-text">'+exName(g,i)+exBadge(g,i)+'</span></li>';
          }).join('') +'</ul>'+
      '</div>'+
      '<div style="text-align:center;font-size:12px;font-weight:800;color:#9a3412;letter-spacing:0.02em;margin-bottom:2px;">'+sub+'</div>'+
      coreDotsHTML(step)+
      '<button class="action-btn" onclick="CORE.startCircuit(\''+g+'\')">'+label+'</button>'+
      (step>0 && step<6 ? '<button class="action-btn ghost" onclick="resetCore()">↺ Reset Circuit</button>' : '');
  }

  el.innerHTML = headHTML('Core Circuit · 1-Min Max Effort', day.label, step+'/6') +
    '<div class="section-body">'+inner+'</div>';
}

function coreLiveHTML(g, day){
  var ph=CORE.phase, step=S.core[g].step;
  if(ph==='exercise'){
    var round=step<3?1:2, ei=step%3;
    return '<div class="circuit-live">'+
      '<div class="circuit-tag work">ROUND '+round+' · EXERCISE '+(ei+1)+' / 3</div>'+
      '<div class="ex-name-big">'+exName(g,ei)+exBadge(g,ei)+'</div>'+
      '<div class="timer-big" id="coreTime">1:00</div>'+
      '<div class="timer-bar"><div class="timer-bar-fill" id="coreBar" style="width:100%"></div></div>'+
      coreDotsHTML(step)+
      '<div class="circuit-ctrls" style="margin-top:12px"><button class="ctrl-skip" onclick="CORE.skip()">⏭ Skip</button>'+
      '<button class="ctrl-stop" onclick="CORE.stop()">⏹ Stop</button></div>'+
    '</div>';
  }
  if(ph==='rest'){
    var ns=step%3; // step already incremented; next exercise index
    return '<div class="circuit-live">'+
      '<div class="circuit-tag rest">REST · NEXT EXERCISE</div>'+
      '<div class="ex-name-big" style="color:#d97706">Up next: '+exName(g,ns)+'</div>'+
      '<div class="timer-big rest" id="coreTime">0:15</div>'+
      '<div class="timer-bar"><div class="timer-bar-fill rest" id="coreBar" style="width:100%"></div></div>'+
      coreDotsHTML(step)+
      '<div class="circuit-ctrls" style="margin-top:12px"><button class="ctrl-skip" onclick="CORE.skip()">⏭ Skip Rest</button>'+
      '<button class="ctrl-stop" onclick="CORE.stop()">⏹ Stop</button></div>'+
    '</div>';
  }
  // circuitRest
  return '<div class="circuit-live">'+
    '<div class="circuit-tag rest">CIRCUIT REST · ROUND 1 COMPLETE</div>'+
    '<div class="ex-name-big" style="color:#d97706">Round 2 coming up</div>'+
    '<div class="timer-big rest" id="coreTime">1:00</div>'+
    '<div class="timer-bar"><div class="timer-bar-fill rest" id="coreBar" style="width:100%"></div></div>'+
    coreDotsHTML(step)+
    '<div class="circuit-ctrls" style="margin-top:12px"><button class="ctrl-skip" onclick="CORE.skip()">⏭ Skip to Round 2</button>'+
    '<button class="ctrl-stop" onclick="CORE.stop()">⏹ Stop</button></div>'+
  '</div>';
}

function coreDotsHTML(step){
  var d='';
  for(var i=0;i<6;i++){ d+='<span class="round-dot'+(i<step?' on':'')+'"></span>'; }
  return '<div class="round-dots">'+d+'</div>';
}
function resetCore(){ CORE.stop(true); S.core[S.activeTab].step=0; CORE.phase='idle'; CORE.group=null; persist(); renderCore(); renderSummary(); }

/* ════════ LIVE SUMMARY + WORKOUT TOTAL ════════ */
function renderSummary(){
  var m=metrics(), g=S.activeTab, day=DAYS[g], step=S.core[g].step;
  var round = step>=6?2:(step<3?1:2);

  document.getElementById('totalValue').textContent =
    m.totalPushups+' Pushups · Ladder '+m.setsDone+'/18 · '+fmtClock(m.elapsed)+' active';

  document.getElementById('sumLadSt').textContent = m.setsDone+' / 18 sets';
  document.getElementById('sumLadRp').textContent = m.ladderReps+' reps'+(m.failed?' · knees':'')+(S.ladder.finisher?' · +29':'');
  document.getElementById('sumCoreNm').textContent = 'Core Circuit · '+day.label;
  document.getElementById('sumCoreSt').textContent = step+' / 6 intervals';
  document.getElementById('sumCoreRp').textContent = m.coreDone?'Both rounds complete':'Round '+round+' · '+day.ex.length+' exercises';

  document.getElementById('gPush').textContent = m.totalPushups;
  document.getElementById('gSets').textContent = m.setsDone+'/18';
  document.getElementById('gTime').textContent = fmtClock(m.elapsed);

  if(window._FW && _FW.updateProgress) _FW.updateProgress(m);
}

/* ════════ BOOT ════════ */
window.MC_SWAP_ONCHANGE=function(){ refreshSwapMovements(); renderCore(); renderSummary(); };
function boot(){
  refreshSwapMovements();
  renderTabs(); renderLadder(); renderCore(); renderSummary();
  if(S.timeStarted) GT.resume();
  window.addEventListener('beforeunload', persist);
}
boot();
</script>

<script>
/* ════════ FINISH-WORKOUT MODULE (wired to live metrics) ════════ */
(function(){
  var WL_KEY='mc_workout_log_v1';

  function inject(){
    document.body.insertAdjacentHTML('beforeend',
      '<div class="fw-bar" id="fwBar"><span class="fw-progress" id="fwProgress">Ladder 0/18 · Core 0/6</span>'+
        '<button class="fw-btn" onclick="_FW.open()">Finish Workout ✓</button></div>'+
      '<div class="fw-modal-overlay" id="fwModal"><div class="fw-modal">'+
        '<div class="fw-modal-title">🏆 Finish Driveway Beatdown?</div>'+
        '<div class="fw-modal-sub">This saves your live session to Workout Logs.</div>'+
        '<div class="fw-summary" id="fwSummary"></div>'+
        '<div class="fw-modal-btns"><button class="fw-cancel" onclick="_FW.close()">Cancel</button>'+
          '<button class="fw-confirm" onclick="_FW.confirm()">Save & Finish</button></div>'+
      '</div></div>'+
      '<div class="fw-auto-banner" id="fwAutoBanner" onclick="_FW.open()">🏆 Ladder + circuit complete — tap to finish</div>');
  }

  window._FW={
    updateProgress:function(m){
      var g=S.activeTab, step=S.core[g].step;
      var el=document.getElementById('fwProgress');
      if(el) el.textContent='Ladder '+m.setsDone+'/18 · Core '+step+'/6';
      var banner=document.getElementById('fwAutoBanner');
      if(banner) banner.classList.toggle('show', m.ladderComplete && m.coreDone);
    },
    open:function(){
      var m=metrics(), g=S.activeTab;
      var s=document.getElementById('fwSummary');
      if(s){
        s.innerHTML=
          '<div class="fw-summary-row"><span class="fw-summary-label">Workout</span><span class="fw-summary-val">Driveway Demolition</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Active time</span><span class="fw-summary-val">'+fmtClock(m.elapsed)+'</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Pushups</span><span class="fw-summary-val">'+m.totalPushups+' / 200</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Ladder sets</span><span class="fw-summary-val">'+m.setsDone+' / 18'+(m.failed?' (failure)':'')+'</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Finisher 29</span><span class="fw-summary-val">'+(S.ladder.finisher?'✓ done':'—')+'</span></div>'+
          '<div class="fw-summary-row"><span class="fw-summary-label">Core ('+DAYS[g].label+')</span><span class="fw-summary-val">'+m.coreStep+' / 6 intervals</span></div>';
      }
      var md=document.getElementById('fwModal'); if(md) md.classList.add('open');
    },
    close:function(){ var m=document.getElementById('fwModal'); if(m) m.classList.remove('open'); },
    confirm:function(){
      var m=metrics(), g=S.activeTab;
      var entry={pageId:PID, workoutName:'Driveway Demolition', day:DAYS[g].label,
        date:new Date().toISOString(),
        time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
        duration:fmtClock(m.elapsed),
        pushups:m.totalPushups, ladderSets:m.setsDone, finisher:S.ladder.finisher,
        coreIntervals:m.coreStep, sets:[], prs:0, setsChecked:m.setsDone+m.coreStep};
      try{
        var logs=JSON.parse(localStorage.getItem(WL_KEY)||'[]');
        logs.unshift(entry); logs=logs.slice(0,200);
        localStorage.setItem(WL_KEY,JSON.stringify(logs));
      }catch(e){}
      window._FW.close();
      var btn=document.querySelector('.fw-btn');
      if(btn){ btn.textContent='✓ Saved!'; btn.style.background='#34d399'; }
      var banner=document.getElementById('fwAutoBanner'); if(banner) banner.classList.remove('show');
      setTimeout(function(){ if(btn){ btn.textContent='Finish Workout ✓'; btn.style.background=''; } },2000);
    }
  };

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){inject();renderSummary();});
  else { inject(); renderSummary(); }
})();
</script>
