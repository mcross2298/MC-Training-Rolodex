<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bonus Workouts — MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;color:#e2e8f0;padding-bottom:120px;}
.header{background:linear-gradient(135deg,#0c4a6e,#04141f);padding:60px 20px 22px;border-bottom:1px solid rgba(56,189,248,0.25);position:relative;}
.back-link{position:absolute;top:18px;left:18px;color:#7dd3fc;text-decoration:none;font-size:13px;font-weight:700;background:rgba(56,189,248,0.14);padding:6px 14px;border-radius:20px;border:1px solid rgba(56,189,248,0.4);}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.25em;color:#7dd3fc;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:28px;font-weight:900;color:#fff;margin-bottom:10px;}
.subtitle{font-size:13px;color:#94a3b8;font-weight:600;line-height:1.5;}
.content{max-width:680px;margin:0 auto;padding:18px 16px 0;}

.modules{display:flex;flex-direction:column;gap:16px;}
.module{border-radius:20px;overflow:hidden;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;user-select:none;
  background:linear-gradient(135deg,#0c2233,#04141f);border:1px solid rgba(56,189,248,0.22);box-shadow:0 4px 20px rgba(0,0,0,0.2),inset 0 1px 0 rgba(56,189,248,0.08);}
.module:active{transform:scale(0.985);}
.module-header{display:flex;align-items:center;padding:20px 22px;position:relative;gap:16px;}
.module-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  background:rgba(56,189,248,0.15);border:1px solid rgba(56,189,248,0.25);}
.module-label{flex:1;}
.module-tag{font-size:11px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:4px;color:#7dd3fc;}
.module-name{font-size:24px;font-weight:900;letter-spacing:0.02em;line-height:1;color:#fff;}
.module-count{font-size:11px;font-weight:500;color:#94a3b8;margin-top:5px;letter-spacing:0.02em;}
.chevron{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:transform 0.25s;flex-shrink:0;color:#7dd3fc;background:rgba(56,189,248,0.12);}
.module.open .chevron{transform:rotate(90deg);}
.drill{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1);}
.module.open .drill{max-height:4000px;}
.drill-inner{padding:0 18px 18px;}
.drill-divider{height:1px;margin-bottom:14px;background:rgba(56,189,248,0.25);}

.workout-row{display:flex;align-items:center;padding:14px 14px;border-radius:12px;margin-bottom:8px;text-decoration:none;color:inherit;gap:14px;transition:background 0.15s;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);}
.workout-row:last-child{margin-bottom:0;}
.workout-row:active{background:rgba(56,189,248,0.1);}
.row-emoji{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
.row-text{flex:1;min-width:0;}
.row-name{font-size:15px;font-weight:800;letter-spacing:-0.01em;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-detail{font-size:11px;font-weight:500;margin-top:2px;color:#94a3b8;}
.row-badge{font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:4px 9px;border-radius:6px;white-space:nowrap;background:rgba(56,189,248,0.18);color:#7dd3fc;border:1px solid rgba(56,189,248,0.35);}
.row-arrow{font-size:13px;color:#64748b;}

.bonus-empty{text-align:center;color:#64748b;font-size:13px;font-weight:600;line-height:1.6;padding:50px 20px;}
.bonus-cta{display:inline-block;margin-top:6px;padding:11px 20px;border-radius:12px;background:linear-gradient(90deg,#22d3ee,#38bdf8);color:#04121f;font-size:14px;font-weight:900;text-decoration:none;}
</style>
<link rel="stylesheet" href="base.css?v=65"/>
<link rel="stylesheet" href="mc-nav.css"/>
<script src="mc-theme.js"></script>
</head>
<body>
<div class="header">
  <a href="dashboard.html" class="back-link">&larr; Dashboard</a>
  <div class="header-inner">
    <div class="eyebrow">🎁 MC Training</div>
    <div class="title">Bonus Workouts</div>
    <div class="subtitle">Standalone sessions not tied to a core program — collected automatically, newest first. Build a workout and leave it unassigned and it lands here.</div>
  </div>
</div>

<div class="content">
  <div class="modules" id="bonusModules"></div>
</div>

<script>
  function toggle(el){
    const wasOpen=el.classList.contains('open');
    document.querySelectorAll('.module.open').forEach(m=>m.classList.remove('open'));
    if(!wasOpen)el.classList.add('open');
  }
</script>
<script src="mc-bonus-routing.js"></script>
<script>
  MC_BONUS.renderLanding(document.getElementById('bonusModules'));
</script>
<script src="mc-nav.js"></script>
</body>
</html>
