<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Custom Program — MC Training</title>
<style>
:root{--accent:#34d399;--accent-rgb:52,211,153;}
.header{background:linear-gradient(135deg,rgba(var(--accent-rgb),0.16),#0a0a0a);}
</style>
<link rel="stylesheet" href="base.css?v=65"/>
<link rel="stylesheet" href="mc-card-actions.css"/>
<link rel="stylesheet" href="mc-nav.css"/>
<link rel="stylesheet" href="mc-setlog.css"/>
<link rel="stylesheet" href="mc-summary.css"/>
<script>
// Namespace persistence per program DAY (week-agnostic, so "Last: X lb" cues
// and suggestions carry from week to week) BEFORE the shared logger/summary/
// finish modules read it — they capture window.MC_PID_OVERRIDE on load.
(function () {
  var qs = new URLSearchParams(location.search);
  window.__CP = {
    prog: qs.get('prog') || '',
    week: Math.max(1, parseInt(qs.get('w'), 10) || 1),
    day: Math.max(1, parseInt(qs.get('d'), 10) || 1)
  };
  window.MC_PID_OVERRIDE = 'cprog-' + __CP.prog + '-d' + __CP.day;
})();
</script>
</head><body>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill"></div></div>
<div class="header">
  <a class="back-link" id="backLink" href="dashboard.html?tab=programs">← Schedule</a>
  <div class="header-inner">
    <div class="eyebrow" id="hdEyebrow">🧩 Custom Program</div>
    <div class="title" id="hdTitle">Workout</div>
    <div><span class="week-badge" id="hdWeek"></span></div>
  </div>
</div>

<div class="content" id="app"></div>

<script src="mc-program-store.js"></script>
<script src="mc-program-pub.js"></script>
<script src="mc-timer.js"></script>
<script>
(function () {
  // local custom program first; otherwise the owner-published mirror (it is
  // always warm here — every path to this page goes through cat-custom.html,
  // which fetches published programs before its day links render)
  var p = window.MCPrograms ? MCPrograms.get(window.__CP.prog) : null;
  if (!p && window.MCPub) p = MCPub.get(window.__CP.prog);
  var day = p && p.days[window.__CP.day - 1];
  var app = document.getElementById('app');

  if (!p || !day) {
    document.getElementById('hdTitle').textContent = 'Not found';
    app.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#94a3b8;font-weight:700;">' +
      'This program day could not be found on this device.<br><br>' +
      '<a href="build-program.html" style="color:var(--accent);">← Program Builder</a></div>';
    return;
  }

  // theme the page with the program's own color rail
  var m = /^#?(..)(..)(..)$/.exec(p.color || '');
  if (m) {
    document.documentElement.style.setProperty('--accent', p.color);
    document.documentElement.style.setProperty('--accent-rgb',
      parseInt(m[1], 16) + ',' + parseInt(m[2], 16) + ',' + parseInt(m[3], 16));
  }

  document.title = p.name + ' — ' + day.name;
  document.getElementById('hdEyebrow').textContent = (p.icon || '🧩') + ' ' + p.name;
  document.getElementById('hdTitle').textContent = day.name;
  document.getElementById('hdWeek').textContent = 'Week ' + window.__CP.week + ' of ' + p.weeks;
  document.getElementById('backLink').href = 'cat-custom.html?prog=' + p.id + '&w=' + window.__CP.week;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  // same contract as the per-page makeRestTimer the program pages use —
  // mc-setlog.js reads data-rest off .rest-timer to auto-start prescribed rest
  function restTimer(rest, name) {
    var secs = parseInt(rest, 10) || 0;
    if (!secs) return '';
    var label = secs >= 60 && secs % 60 === 0 ? (secs / 60) + ' min' : secs + ' sec';
    return '<span class="rest-timer idle" data-rest="' + label + '" data-label="' + label + '" ' +
      'onclick="buildTimerFloat();TMR.toggle(this,' + secs + ',\'' + esc(name).replace(/'/g, '') + '\')" ' +
      'title="Tap to start rest timer">' +
      '<span class="rest-timer-icon">⏱️</span><span class="rest-timer-label">' + label + '</span></span>';
  }

  app.innerHTML = '<div class="tap-hint">Tap to check off</div>' + day.exercises.map(function (ex, i) {
    var scheme = (ex.sets || 3) + '×' + (ex.reps || '10');
    return '<div class="ex-card a-card" data-id="d' + window.__CP.day + '-x' + (i + 1) + '" data-type="single">' +
      '<div class="ex-body"><div class="ex-content">' +
        '<div class="a-top"><div class="a-idx">' + (i + 1) + '</div>' +
        '<div class="a-head"><div class="ex-name a-name">' + esc(ex.name) + '</div>' +
        (ex.muscle ? '<div class="a-badges"><span class="type-badge tb-midset">' + esc(ex.muscle) + '</span></div>' : '') +
        '</div></div>' +
        '<div class="a-strip"><div class="a-cell"><span class="k">Sets</span><span class="v"><span class="ex-sets" data-field="sets">' + esc(scheme) + '</span></span></div>' +
        '<div class="a-cell"><span class="k">Rest</span><span class="v">' + (ex.rest ? ex.rest + 's' : '—') + '</span></div></div>' +
        '<div class="a-timerbar">' + restTimer(ex.rest, ex.name) + '</div>' +
      '</div></div></div>';
  }).join('');

  // tap card to check off (same behavior as program pages)
  Array.prototype.forEach.call(app.querySelectorAll('.ex-card'), function (c) {
    c.addEventListener('click', function () { c.classList.toggle('checked'); });
  });
})();
</script>
<script src="mc-finish.js"></script>
<script src="mc-supabase.js"></script>
<script src="mc-sync.js"></script>
<script src="mc-card-actions.js"></script>
<script src="mc-live-tracker.js"></script>
<script src="mc-nav.js"></script>
<script src="mc-setlog.js"></script>
<script src="mc-session.js"></script>
<script src="mc-suggest.js"></script>
<script src="mc-chart.js"></script>
<script src="mc-exercise-trends.js"></script>
<script src="mc-cues-data.js"></script>
<script src="mc-cues.js"></script>
<script src="mc-rep-progress.js"></script>
<script src="mc-sw-update.js?v=45"></script>
<script src="mc-summary.js"></script>
</body></html>
