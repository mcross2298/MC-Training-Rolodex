<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#161616;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --gold:#d4af37;--gold-dim:rgba(212,175,55,0.15);--gold-glow:rgba(212,175,55,0.25);
  --text:#fff;--muted:#9ca3af;--muted2:var(--muted);
  --ctrl-h:78px;
}
body{background:var(--bg);min-height:100vh;color:var(--text);padding-bottom:var(--ctrl-h);overflow-x:hidden;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:12px;padding:18px 16px 12px;
  position:sticky;top:0;z-index:20;
  background:linear-gradient(to bottom,var(--bg) 78%,transparent);
}
.back{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--gold);font-size:16px;text-decoration:none;
}
.topbar-info{flex:1;min-width:0;}
.topbar-title{font-size:17px;font-weight:900;letter-spacing:-0.02em;}
.topbar-sub{font-size:12px;color:var(--muted2);margin-top:1px;}
.skip{font-size:12px;font-weight:800;color:var(--muted2);text-decoration:none;letter-spacing:0.04em;padding:8px;}

/* ── PROGRESS ── */
.progress-wrap{padding:2px 16px 14px;}
.progress-track{height:5px;border-radius:3px;background:rgba(255,255,255,0.07);overflow:hidden;}
.progress-fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,#8a6a10,var(--gold));transition:width 0.35s cubic-bezier(.4,0,.2,1);}
.progress-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted2);}
.progress-meta .pm-step{color:var(--gold);}

/* ── EXEC SUMMARY DRILL-IN ── */
.exec-link{
  display:flex;align-items:center;gap:11px;text-decoration:none;
  max-width:560px;margin:0 auto 16px;padding:12px 14px;
  background:linear-gradient(135deg,rgba(212,175,55,0.1),rgba(212,175,55,0.03));
  border:1px solid rgba(212,175,55,0.3);border-radius:14px;
}
.exec-link:active{background:rgba(212,175,55,0.16);}
.exec-ico{font-size:20px;flex-shrink:0;}
.exec-body{flex:1;min-width:0;}
.exec-lbl{font-size:10px;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);}
.exec-nm{font-size:13px;font-weight:800;color:#fff;margin-top:1px;line-height:1.35;}
.exec-arrow{color:var(--gold);font-size:16px;flex-shrink:0;}
.exec-wrap{padding:0 16px;}

/* ── SLIDE ── */
.deck{max-width:560px;margin:0 auto;padding:0 16px;}
.slide{display:none;animation:slideIn 0.34s cubic-bezier(.2,.7,.2,1);}
.slide.active{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.eyebrow{font-size:11px;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.slide-title{font-size:25px;font-weight:900;letter-spacing:-0.02em;line-height:1.15;margin-bottom:6px;}
.slide-tagline{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:18px;}

/* ── VIDEO / SCENE FRAME ── */
.scene{
  position:relative;border-radius:18px;overflow:hidden;margin-bottom:18px;
  background:linear-gradient(135deg,#0a1628,#020b18);
  border:1px solid var(--scene-c,rgba(212,175,55,0.28));
  box-shadow:0 8px 30px rgba(0,0,0,0.45);
  aspect-ratio:16/10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:20px;
}
.scene-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 30% 30%,var(--scene-glow,rgba(212,175,55,0.12)) 0%,transparent 62%);}
.scene-glyph{font-size:54px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 4px 14px rgba(0,0,0,0.5));}
.scene-caption{font-size:13px;font-weight:800;color:#e2e8f0;letter-spacing:0.01em;max-width:80%;line-height:1.45;}
.scene-clip{
  position:absolute;left:12px;bottom:12px;display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);background:rgba(0,0,0,0.45);border:1px solid var(--border2);
  border-radius:20px;padding:4px 10px;backdrop-filter:blur(6px);
}
.scene-clip .dot{width:7px;height:7px;border-radius:50%;background:#ef4444;box-shadow:0 0 8px #ef4444;animation:rec 1.6s ease-in-out infinite;}
@keyframes rec{0%,100%{opacity:1;}50%{opacity:0.25;}}
.scene-play{
  position:absolute;right:12px;bottom:12px;width:40px;height:40px;border-radius:50%;
  background:rgba(212,175,55,0.16);border:1.5px solid rgba(212,175,55,0.45);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--gold);
}

/* ── NARRATION ── */
.narration{
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  padding:14px 16px;margin-bottom:16px;position:relative;
}
.narration::before{content:'🎙️ COACH';position:absolute;top:-9px;left:14px;font-size:10px;font-weight:900;letter-spacing:0.12em;color:var(--gold);background:var(--bg);padding:0 7px;}
.narration p{font-size:14px;line-height:1.6;color:#e2e8f0;margin-top:4px;}

/* ── STEPS ── */
.steps-label{font-size:11px;font-weight:900;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted2);margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.steps-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.1),transparent);}
.steps{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.step{display:flex;gap:11px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;}
.step-n{
  flex-shrink:0;width:22px;height:22px;border-radius:7px;
  background:var(--gold-dim);border:1px solid rgba(212,175,55,0.3);
  color:var(--gold);font-size:12px;font-weight:900;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.step-tx{font-size:13px;line-height:1.5;color:#cbd5e1;}
.step-tx b{color:#fff;font-weight:800;}
.step-tx .tap{color:var(--gold);font-weight:800;}

/* ── PRO TIP ── */
.tip{
  display:flex;gap:10px;align-items:flex-start;
  background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.25);
  border-radius:12px;padding:11px 13px;margin-bottom:18px;
}
.tip-ico{font-size:16px;flex-shrink:0;line-height:1.4;}
.tip-tx{font-size:12.5px;line-height:1.55;color:#a7f3d0;}
.tip-tx b{color:#6ee7b7;font-weight:800;}

/* ── INLINE CTA (jump into the real screen) ── */
.try-cta{
  display:flex;align-items:center;gap:10px;text-decoration:none;
  background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.3);
  border-radius:14px;padding:13px 15px;margin-bottom:8px;
}
.try-cta:active{background:rgba(212,175,55,0.14);}
.try-cta-ico{font-size:19px;}
.try-cta-body{flex:1;min-width:0;}
.try-cta-lbl{font-size:10px;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);}
.try-cta-nm{font-size:13.5px;font-weight:800;color:#fff;margin-top:1px;}
.try-cta-arrow{color:var(--gold);font-size:16px;flex-shrink:0;}

/* ── FINISH CARD (last slide) ── */
.finish-cta{
  display:block;width:100%;text-align:center;text-decoration:none;
  padding:15px;border-radius:14px;background:var(--gold);color:#000;
  font-size:15px;font-weight:900;letter-spacing:0.03em;margin-top:6px;
}
.finish-cta:active{opacity:0.85;}
.finish-list{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.finish-list li{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;line-height:1.5;color:#cbd5e1;}
.finish-list .chk{color:var(--gold);font-weight:900;flex-shrink:0;}

/* ── BOTTOM CONTROLS ── */
.controls{
  position:fixed;left:0;right:0;bottom:0;z-index:50;height:var(--ctrl-h);
  background:rgba(10,10,10,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:12px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
}
.nav-btn{
  flex:1;height:50px;border-radius:13px;border:1px solid var(--border2);
  background:var(--surface);color:#fff;font-size:14px;font-weight:800;letter-spacing:0.02em;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity 0.15s,transform 0.1s;
}
.nav-btn:active{transform:scale(0.98);}
.nav-btn.primary{background:var(--gold);color:#000;border-color:var(--gold);flex:1.4;}
.nav-btn:disabled{opacity:0.32;cursor:not-allowed;}

/* ── DOT NAV ── */
.dots{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:4px 0 22px;}
.dot-nav{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.14);cursor:pointer;transition:all 0.2s;border:none;padding:0;}
.dot-nav.active{background:var(--gold);width:22px;border-radius:4px;}
.dot-nav.seen{background:rgba(212,175,55,0.4);}
</style>

</head>

<div class="exec-wrap">

</div>

<script>
/* ============================================================================
   MC Training — Quick Tour
   A balanced slide tour: each module = a visual summary + step-by-step actions.
   Self-contained, vanilla JS. The .scene frame is a host for an optional
   screen-capture clip (drop a <video>/gif in via data-clip later); until then
   it renders a branded "scene" still so the tour reads as video + slides.
   ========================================================================== */

// Each slide: {eyebrow, title, tagline, scene:{glyph,caption,color,glow},
//   narration, steps:[], tip?, cta?:{label,name,href,ico}}
const SLIDES = [
  {
    eyebrow:'Welcome',
    title:"Welcome to MC Training",
    tagline:"Your pocket gym — programs, set logging, PRs, and custom workouts, all offline-ready. This 3-minute tour gets you moving with zero guesswork.",
    scene:{glyph:'💪',caption:'10 programs · 500+ exercises · set & PR tracking · macro tracker',color:'rgba(212,175,55,0.3)',glow:'rgba(212,175,55,0.14)'},
    narration:"Welcome in. Whether you came to lift heavy, chase a pump, build your own session, or track your macros — everything lives one or two taps from your dashboard. Swipe or hit Next, and I'll walk you through it.",
    steps:[
      {tx:"Use <span class='tap'>Next →</span> / <b>← Back</b> below, the dots, or swipe left/right."},
      {tx:"Tap any gold <span class='tap'>Open it</span> card to jump straight into the real screen and try it live."},
      {tx:"Hit <b>Skip</b> anytime — you can relaunch this tour from the dashboard's <b>Quick Tour</b> tile whenever you want."}
    ]
  },
  {
    eyebrow:'Module 1 · Home base',
    title:"Your Dashboard at a glance",
    tagline:"The dashboard is your hub. Three zones, one bottom tab bar — learn these and you can reach anything.",
    scene:{glyph:'⚡',caption:'Current Program · Training Tools · bottom tabs',color:'rgba(212,175,55,0.3)',glow:'rgba(212,175,55,0.14)'},
    narration:"Start at the top: your Current Program hero card, with the search icon right beside the calendar and theme toggle. Below the hero, the Training Tools grid — Library, Logs, Build Your Own, Program Guide, and this tour. And pinned to the bottom: Dashboard, Programs, and Conditioning. That bar follows you everywhere.",
    steps:[
      {tx:"<b>Top-right — Search:</b> tap the 🔍 icon on any tab to search across every program and the full exercise catalog at once — tap a result to jump straight there."},
      {tx:"<b>Top — Current Program:</b> the program you've pinned shows here with its splits."},
      {tx:"<b>Middle — Training Tools:</b> your 2×2 grid of power tools (plus this Quick Tour)."},
      {tx:"<b>Bottom tabs:</b> <span class='tap'>⚡ Dashboard</span> · <span class='tap'>🏋️ Programs</span> · <span class='tap'>🔥 Conditioning</span> — always one tap away."},
      {tx:"<b>🤖 Coach Note:</b> tap to expand this collapsed card for a short AI read on your last 30 days — a headline summary plus chips for any per-lift flags, muscle-volume warnings, and swap ideas. Signed-in only; refreshes once a day."},
      {tx:"If your coach uses PM Mode to assign you a program or macro goals, a <b>🎯 “Your coach has a suggestion”</b> card appears here — tap Accept to apply it, or ✕ to dismiss. Nothing changes on your account unless you tap Accept."},
      {tx:"<b>🍳 Recipes:</b> tap the utensils icon next to the theme toggle to open Mike's Cookbook — recipes, meal planning, and the same macro tracker, without leaving your workout flow."},
      {tx:"Signed in with your week planned in Mike's Cookbook? A compact <b>Today strip</b> appears above Current Program — today's planned meals and your calorie goal in one glance. Tap it to jump straight into Nutrition."},
    ],
    tip:"On any other screen, the same bottom bar brings you home — you can't get lost."
  },
  {
    eyebrow:'Module 2 · Set your focus',
    title:"Pin your Current Program",
    tagline:"Pinning a program puts it front-and-center on your dashboard so today's training is always one tap away.",
    scene:{glyph:'📌',caption:'Tap “See all” → choose a program → Set as Active',color:'rgba(212,175,55,0.3)',glow:'rgba(212,175,55,0.14)'},
    narration:"See that hero card at the top? Tap “See all,” and a sheet slides up with every program. Pick the one you're running, hit Set as Active Program, and it pins to your dashboard — split chips and all. Change it anytime; it remembers your choice.",
    steps:[
      {tx:"On the dashboard, tap <span class='tap'>See all</span> (top-right of <b>Current Program</b>)."},
      {tx:"In the sheet, tap a program — the checkmark confirms your pick."},
      {tx:"Tap <span class='tap'>Set as Active Program</span>. Your hero card updates instantly."}
    ],
    cta:{ico:'📌',label:'Try it now',name:'Open the dashboard & pin a program',href:'dashboard.html'}
  },
  {
    eyebrow:'Module 3 · Find your workout',
    title:"Browse Programs & open a workout",
    tagline:"The Programs tab is your menu of training styles"+
      ".",
    scene:{glyph:'🏋️',caption:'Programs tab → category → split → today’s workout',color:'rgba(139,92,246,0.35)',glow:'rgba(139,92,246,0.14)'},
    narration:"Tap Programs on the bottom bar. You'll see the color-coded programs — Flagship tier: Strength & Supersets, Project Muscle Confusion, Mike Cross' Favorites, Everything Under the Kitchen Sink, The Modality Matrix, and the High-Volume Training Template"+
      ". Tap one, pick a split, and you're on the workout page with every exercise laid out.",
    steps:[
      {tx:"Tap <span class='tap'>🏋️ Programs</span> in the bottom bar."},
      {tx:"Tap a <b>category card</b>"+
        " to see its splits."},
      {tx:"Pick a <b>split / day</b> to open that workout, ready to log."},
      {tx:"Can't decide? Most category pages have a <span class='tap'>🎲 Surprise Me</span> button near the top — tap it to jump straight into a random split or workout from that program."}
    ],
    cta:{ico:'🏋️',label:'Try it now',name:'Browse all the programs',href:'dashboard.html?tab=programs'}
  },
  {
    eyebrow:'Module 4 · ⭐ Core skill',
    title:"Log your sets + rest timer",
    tagline:"This is the heartbeat of the app. Every exercise card has a Log Sets dropdown — weight, reps, check it off, rest auto-starts.",
    scene:{glyph:'✅',caption:'Log Sets → enter weight & reps → tap ✓ → rest timer fires',color:'rgba(52,211,153,0.35)',glow:'rgba(52,211,153,0.12)'},
    narration:"On any workout, tap “Log Sets” under an exercise. Punch in your weight and reps, then tap the check. Two things happen: the set locks in, and your prescribed rest timer kicks off automatically. Last time's top weight shows right on the card, so you always know what to beat. Drop sets and AMRAP rows are built in too — look for the ∞ symbol.",
    steps:[
      {tx:"On an exercise card, tap <span class='tap'>Log Sets</span> to open the logger."},
      {tx:"Type your <b>Weight</b> and <b>Reps</b> for the set."},
      {tx:"Tap the <span class='tap'>✓</span> checkbox — the set saves and the <b>rest timer auto-starts</b>."},
      {tx:"A <b>“+ DROP”</b> or <b>“+ AMRAP”</b> row appears automatically when the program calls for it."},
      {tx:"On the card's rep scheme, a <b>∞ symbol</b> marks a drop set or burnout round taken to failure — one ∞ per AMRAP set, so <b>“12 · 10 · 8 · ∞ ∞”</b> means two back-to-back AMRAP drops after the working sets. In the Log Sets table itself, that row's Reps box still says <b>“AMRAP”</b> — type in exactly how many reps you completed."},
      {tx:"A <b>🧩 Cluster</b> exercise breaks each working set into mini-sets — the Log Sets row shows a rep bubble per mini-set (e.g. <b>5 + 5 + 5</b>) instead of one box, prefilled with the target so you only edit the ones that came up short (like a <b>5 + 5 + 3</b> last mini-set). Tap the <b>🧩 Cluster</b> badge or note on the card itself to adjust the whole breakdown mid-session — it's your own personal adjustment and never changes what the program publishes."},
      {tx:"Tap <span class='tap'>🎬</span> on the rest timer to switch to <b>Video view</b> — a full-screen countdown with an <b>Up Next</b> card showing what's coming. Tap <span class='tap'>☰ List view</span> to switch back; the app remembers whichever you picked last."},
      {tx:"Prefer one exercise at a time? Tap <span class='tap'>🎯 Start Guided Mode</span> above your first exercise — it dims everything but the exercise you're on and auto-advances the moment you finish its sets."},
      {tx:"Hands full loading a bar? Tap the <span class='tap'>🎙️</span> button (bottom-right on any workout page) to turn on <b>voice control</b>, then just say it: <b>“log 10 reps”</b> checks off your next set, <b>“start timer”</b> starts the rest clock, <b>“skip rest”</b> ends it early. Opt-in only — off until you tap it, and it stays off across sessions until you turn it back on."}
    ],
    tip:"The card shows <b>“Last: X lb · date”</b> plus a green <b>“Suggested: X lb”</b> — the app's planned load for today, computed from how last session went (all reps hit → move up; near-max → hold; short → repeat). Empty weight boxes come prefilled with it — tap one and the number drops in; type over it any time. Stall on the same weight for 4 sessions straight and the app doesn't just flag it — it automatically prefills a <b>−10% deload</b> next time, so the plateau actually breaks instead of sitting there as a badge you have to act on yourself. And remember: ∞ in the rep scheme is just shorthand for AMRAP — always log your real rep count in the Log Sets box."
  },
  {
    eyebrow:'Module 5 · Customize',
    title:"Replace, Reorder & Notes — right on the card",
    tagline:"The three moves you'll reach for most — swap the movement, reorder, or leave a note — sit as one-tap buttons right on every exercise card. The ⋮ menu still has those plus tempo, progress, and intensifiers.",
    scene:{glyph:'⋮',caption:'Replace · Reorder · Notes on the card — Add Tempo & more in ⋮',color:'rgba(212,175,55,0.32)',glow:'rgba(212,175,55,0.14)'},
    narration:"Look above the name on any exercise card and you'll see three small buttons: Replace, Reorder, and Notes. No menu-diving required — tap Replace to swap the movement, Reorder to shuffle your lineup, or Notes to jot something down. Need tempo, your progress history, or an intensifier like a drop or cluster set? Tap the ⋮ in the corner for those.",
    steps:[
      {tx:"<b>🔁 Replace</b> — right on the card. Shows your top 3 closest matches (same muscle + movement first), each tagged with its equipment and a weight to start at. Pick one and the card swaps in place. Fewer than 3 exact matches? Signed-in trainees get a couple of AI-suggested options filled in too, tagged <b>✨ AI</b> so it's clear which is which."},
      {tx:"<b>↕️ Reorder</b> — right on the card. Use the <span class='tap'>▲ ▼</span> arrows; your order sticks."},
      {tx:"<b>📝 Notes</b> — right on the card. Leave a per-exercise note that saves right onto it; the button lights up gold once a note is saved."},
      {tx:"Still tap the <span class='tap'>⋮</span> in the top-right corner for <b>⏱️ Add Tempo</b>, <b>📈 progress history</b>, and drop/cluster/superset controls."}
    ],
    tip:"A weight tagged <b>“from your log”</b> is a real number you've lifted before; <b>“≈”</b> is a starting estimate — trust the real one, treat the estimate as set-1 only. Pick the same swap again later and it moves to the top, marked <b>“Used before.”</b> Every active substitution — and an <b>Revert</b> for each — lives under <b>Stats → My Substitutions</b>."
  },
  {

const TOUR_KEY='mc_tour_done_v1';
let idx=0, seen=new Set([0]);
const deck=document.getElementById('deck');
const dotsWrap=document.getElementById('dots');

function esc(s){return String(s);} // content is author-trusted

function sceneHTML(s){
  return '<div class="scene" style="--scene-c:'+s.scene.color+';--scene-glow:'+s.scene.glow+'">'
    +'<div class="scene-glow"></div>'
    +'<div class="scene-glyph">'+s.scene.glyph+'</div>'
    +'<div class="scene-caption">'+s.scene.caption+'</div>'
    +'<div class="scene-clip"><span class="dot"></span>Tour clip</div>'
    +'<div class="scene-play">▶</div>'
    +'</div>';
}

function buildSlide(s,i){
  var el=document.createElement('div');
  el.className='slide'+(i===0?' active':'');
  el.id='slide-'+i;
  var h='';
  h+='<div class="eyebrow">'+s.eyebrow+'</div>';
  h+='<h1 class="slide-title">'+s.title+'</h1>';
  h+='<p class="slide-tagline">'+s.tagline+'</p>';
  h+=sceneHTML(s);
  h+='<div class="narration"><p>'+s.narration+'</p></div>';
  if(s.steps&&s.steps.length){
    h+='<div class="steps-label">Step by step</div><ol class="steps">';
    s.steps.forEach(function(st,n){
      h+='<li class="step"><div class="step-n">'+(n+1)+'</div><div class="step-tx">'+st.tx+'</div></li>';
    });
    h+='</ol>';
  }
  if(s.finish&&s.finish.length){
    h+='<div class="steps-label">You can now</div><ul class="finish-list">';
    s.finish.forEach(function(f){ h+='<li><span class="chk">✓</span><span>'+f+'</span></li>'; });
    h+='</ul>';
  }
  if(s.tip){
    h+='<div class="tip"><div class="tip-ico">💡</div><div class="tip-tx"><b>Pro tip:</b> '+s.tip+'</div></div>';
  }
  if(s.cta){
    var cls=s.last?'finish-cta':'try-cta';
    if(s.last){
      h+='<a class="finish-cta" href="'+s.cta.href+'" onclick="markDone()">'+s.cta.ico+' '+s.cta.name+' →</a>';
    } else {
      h+='<a class="try-cta" href="'+s.cta.href+'">'
        +'<div class="try-cta-ico">'+s.cta.ico+'</div>'
        +'<div class="try-cta-body"><div class="try-cta-lbl">'+s.cta.label+'</div><div class="try-cta-nm">'+s.cta.name+'</div></div>'
        +'<div class="try-cta-arrow">→</div></a>';
    }
  }
  el.innerHTML=h;
  return el;
}

function buildDots(){
  SLIDES.forEach(function(_,i){
    var b=document.createElement('button');
    b.className='dot-nav'+(i===0?' active':'');
    b.setAttribute('aria-label','Go to step '+(i+1));
    b.onclick=function(){ jump(i); };
    dotsWrap.appendChild(b);
  });
}

function render(){
  SLIDES.forEach(function(s,i){ deck.appendChild(buildSlide(s,i)); });
  buildDots();
  update();
}

function update(){
  // slides
  var slides=document.querySelectorAll('.slide');
  slides.forEach(function(sl,i){ sl.classList.toggle('active',i===idx); });
  // dots
  var dn=document.querySelectorAll('.dot-nav');
  dn.forEach(function(d,i){
    d.classList.toggle('active',i===idx);
    d.classList.toggle('seen',i!==idx && seen.has(i));
  });
  // progress
  var pct=Math.round(((idx+1)/SLIDES.length)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('pmStep').textContent='Step '+(idx+1);
  document.getElementById('pmTotal').textContent=(idx+1)+' / '+SLIDES.length;
  // controls
  document.getElementById('prevBtn').disabled=(idx===0);
  var next=document.getElementById('nextBtn');
  if(idx===SLIDES.length-1){ next.textContent='Finish ✓'; }
  else { next.innerHTML='Next →'; }
  // skip turns into "Done" near the end — keep simple: always dashboard
  window.scrollTo({top:0,behavior:'smooth'});
}

function go(dir){
  if(dir>0 && idx===SLIDES.length-1){ markDone(); location.href='dashboard.html'; return; }
  var n=idx+dir;
  if(n<0||n>=SLIDES.length) return;
  idx=n; seen.add(idx); update();
}
function jump(i){ if(i<0||i>=SLIDES.length) return; idx=i; seen.add(i); update(); }

function markDone(){ try{ localStorage.setItem(TOUR_KEY,'1'); }catch(e){} }

// keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight') go(1);
  else if(e.key==='ArrowLeft') go(-1);
});

// swipe
(function(){
  var x0=null,y0=null;
  document.addEventListener('touchstart',function(e){ var t=e.changedTouches[0]; x0=t.clientX; y0=t.clientY; },{passive:true});
  document.addEventListener('touchend',function(e){
    if(x0===null) return;
    var t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.4){ go(dx<0?1:-1); }
    x0=y0=null;
  },{passive:true});
})();

render();
</script>
