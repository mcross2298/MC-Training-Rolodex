<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Custom Program — MC Training</title>
<link rel="stylesheet" href="base.css?v=65"/>
<link rel="stylesheet" href="mc-nav.css"/>
<style>
:root{--accent:#34d399;--accent-rgb:52,211,153;}
body{background:#0a0a0a;min-height:100vh;color:#e2e8f0;}
.header{padding:18px 18px 20px;background:linear-gradient(135deg,rgba(var(--accent-rgb),0.14),#0a0a0a);}
.back-link{color:var(--accent);text-decoration:none;font-size:14px;font-weight:800;}
.hd-row{display:flex;align-items:center;gap:14px;margin-top:14px;}
.hd-icon{width:54px;height:54px;border-radius:14px;background:rgba(var(--accent-rgb),0.14);
  border:1px solid rgba(var(--accent-rgb),0.4);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.hd-eyebrow{font-size:11px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);}
.hd-title{font-size:24px;font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.15;}
.hd-meta{font-size:12px;font-weight:700;color:#94a3b8;margin-top:3px;}
.hd-actions{display:flex;gap:8px;margin-top:16px;}
.hd-btn{flex:1;padding:11px 0;border-radius:11px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);
  color:#e2e8f0;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;
  -webkit-tap-highlight-color:transparent;}
.hd-btn.pin{background:var(--accent);border-color:var(--accent);color:#000;}
.hd-btn.danger{color:#f87171;border-color:rgba(239,68,68,0.25);flex:0 0 48px;}
.content{max-width:680px;margin:0 auto;padding:18px 18px 110px;}
.week-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch;}
.wt{flex-shrink:0;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
  color:#94a3b8;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.wt.on{background:var(--accent);border-color:var(--accent);color:#000;}
.day-link{display:flex;align-items:center;gap:13px;background:#101010;border:1px solid rgba(255,255,255,0.08);
  border-left:3px solid var(--accent);border-radius:14px;padding:15px 14px;margin-bottom:10px;text-decoration:none;
  -webkit-tap-highlight-color:transparent;}
.day-link:active{background:#141414;}
.dl-num{width:34px;height:34px;border-radius:10px;background:rgba(var(--accent-rgb),0.12);border:1px solid rgba(var(--accent-rgb),0.35);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--accent);flex-shrink:0;}
.dl-name{flex:1;font-size:15px;font-weight:800;color:#fff;min-width:0;}
.dl-meta{font-size:11px;font-weight:700;color:#64748b;margin-top:2px;}
.dl-done{font-size:11px;font-weight:900;color:#34d399;flex-shrink:0;}
.dl-arrow{color:#64748b;font-size:15px;flex-shrink:0;}
/* PM Phase 2b — custom-program layout variants (set by applyLayout) */
#dayList.dl-calendar{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:560px){#dayList.dl-calendar{grid-template-columns:repeat(3,1fr);}}
#dayList.dl-calendar .day-link{flex-direction:column;align-items:flex-start;gap:8px;min-height:104px;margin-bottom:0;}
#dayList.dl-calendar .dl-arrow{display:none;}
#dayList.dl-timeline{position:relative;padding-left:6px;}
#dayList.dl-timeline .day-link{position:relative;margin-left:20px;}
#dayList.dl-timeline .day-link::before{content:'';position:absolute;left:-20px;top:0;bottom:-12px;width:2px;background:rgba(var(--accent-rgb),0.3);}
#dayList.dl-timeline .day-link::after{content:'';position:absolute;left:-25px;top:16px;width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.18);}
#dayList.dl-timeline .day-link:last-child::before{bottom:auto;height:16px;}
.missing{padding:60px 20px;text-align:center;color:#94a3b8;font-size:14px;font-weight:700;}
.missing a{color:var(--accent);}
.new-banner{margin-bottom:14px;padding:11px 14px;border-radius:12px;background:rgba(52,211,153,0.1);
  border:1px solid rgba(52,211,153,0.3);color:#34d399;font-size:13px;font-weight:800;text-align:center;}
</style>
</head><body>

<div class="header" id="hd">
  <a href="dashboard.html?tab=programs" class="back-link">← Programs</a>
  <div class="hd-row">
    <div class="hd-icon" id="hdIcon">🧩</div>
    <div>
      <div class="hd-eyebrow">Custom Program</div>
      <div class="hd-title" id="hdTitle">…</div>
      <div class="hd-meta" id="hdMeta"></div>
    </div>
  </div>
  <div class="hd-actions" id="hdActions" style="display:none;">
    <button class="hd-btn pin" id="pinBtn">📌 Set as Active</button>
    <a class="hd-btn" id="editBtn" href="#">✏️ Edit</a>
    <button class="hd-btn" id="shareBtn">📤 Share</button>
    <button class="hd-btn" id="pubBtn" style="display:none;">📣 Publish</button>
    <button class="hd-btn danger" id="delBtn" title="Delete program">🗑</button>
  </div>
</div>

<div class="content">
  <div id="newBanner" class="new-banner" style="display:none;">✅ Program saved — it now lives in your Programs tab.</div>
  <div class="week-tabs" id="weekTabs"></div>
  <div id="dayList"></div>
</div>

<script src="mc-program-store.js"></script>
<script src="mc-program-pub.js"></script>
<script src="mc-share.js"></script>
<script>
(function () {
  var qs = new URLSearchParams(location.search);
  var progId = qs.get('prog') || qs.get('pub') || '';
  var week = Math.max(1, parseInt(qs.get('w'), 10) || 1);
  var $ = function (id) { return document.getElementById(id); };

  function onReady(fn) {
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn);
    else fn();
  }

  // the local copy wins (it's the editable one); otherwise fall back to the
  // owner-published mirror so any user can open a published program
  function resolve() {
    var local = window.MCPrograms ? MCPrograms.get(progId) : null;
    if (local) return { p: local, isPub: false };
    var pub = window.MCPub ? MCPub.get(progId) : null;
    return pub ? { p: pub, isPub: true } : null;
  }

  function notFound() {
    document.querySelector('.content').innerHTML =
      '<div class="missing">Program not found on this device.<br><br>' +
      '<a href="build-program.html">＋ Build a program</a></div>';
    $('hdTitle').textContent = 'Not found';
  }

  var hit = resolve();
  if (hit) { boot(hit.p, hit.isPub); return; }
  // not on this device — the published mirror may just be cold; pull it once
  // Supabase is up (mc-program-pub.js / mc-supabase.js load below us)
  onReady(function () {
    var done = function () {
      var h = resolve();
      if (h) boot(h.p, h.isPub); else notFound();
    };
    if (window.MCPub) MCPub.refresh(true).then(done, done);
    else done();
  });
  return;

  function boot(p, isPub) {

  if (qs.get('new')) $('newBanner').style.display = 'block';

  // accent = the program's own color rail
  var hex = p.color || '#34d399';
  var m = /^#?(..)(..)(..)$/.exec(hex);
  if (m) {
    document.documentElement.style.setProperty('--accent', hex);
    document.documentElement.style.setProperty('--accent-rgb',
      parseInt(m[1], 16) + ',' + parseInt(m[2], 16) + ',' + parseInt(m[3], 16));
  }

  document.title = p.name + ' — MC Training';
  $('hdIcon').textContent = p.icon || '🧩';
  $('hdTitle').textContent = p.name;
  $('hdMeta').textContent = p.weeks + ' weeks · ' + p.days.length + ' days/week';
  $('hdActions').style.display = 'flex';

  if (isPub) {
    // someone else's published program — viewable and runnable, not editable
    document.querySelector('.hd-eyebrow').textContent = 'Published Program';
    $('editBtn').style.display = 'none';
    $('delBtn').style.display = 'none';
  } else {
    $('editBtn').href = 'build-program.html?id=' + p.id;
  }

  $('pinBtn').addEventListener('click', function () {
    try {
      var card = isPub ? MCPub.asProgCard(p) : MCPrograms.asProgCard(p);
      localStorage.setItem('mc_active_prog', JSON.stringify(card));
      document.dispatchEvent(new CustomEvent('mc:program-changed'));
    } catch (e) {}
    $('pinBtn').textContent = '✓ Active Program';
  });
  $('shareBtn').addEventListener('click', function () {
    if (window.MCShare) MCShare.shareProgram(p);
  });
  $('delBtn').addEventListener('click', function () {
    if (!confirm('Delete "' + p.name + '"? Logged history is kept; the program itself is removed.')) return;
    MCPrograms.remove(p.id);
    try {
      var act = JSON.parse(localStorage.getItem('mc_active_prog') || 'null');
      if (act && act.cprogId === p.id) localStorage.removeItem('mc_active_prog');
    } catch (e) {}
    location.href = 'dashboard.html?tab=programs';
  });

  // ---- PM-only: publish this program to ALL users (Supabase, RLS-guarded) ----
  // The PM session flag just reveals the button; the real boundary is the
  // admin-only write policy on published_programs (supabase/phase3.sql).
  (function () {
    var pmActive = false;
    try { pmActive = sessionStorage.getItem('mc_pm_active') === '1'; } catch (e) {}
    if (isPub || !pmActive || !window.MCPub) return;
    var btn = $('pubBtn');
    function refreshLabel() { btn.textContent = MCPub.isPublished(p.id) ? '✓ Published' : '📣 Publish'; }
    document.addEventListener('mc:published-programs', refreshLabel);
    onReady(function () {
      if (!window.MC_SB || !MC_SB.configured) return;
      MC_SB.isOwner().then(function (owner) {
        if (!owner) return;
        refreshLabel();
        btn.style.display = '';
      });
    });
    btn.addEventListener('click', function () {
      function fail(e) {
        btn.disabled = false; refreshLabel();
        alert('Publish failed: ' + ((e && e.message) || 'unknown error') +
              '\nIf this is a permission error, your account is not in the admins table.');
      }
      function doPublish() {
        btn.disabled = true; btn.textContent = 'Publishing…';
        MCPub.publish(JSON.parse(JSON.stringify(p))).then(function () {
          btn.disabled = false; refreshLabel();
          alert('Published — "' + p.name + '" appears in every user\'s Programs tab within ~1 minute.');
        }, fail);
      }
      if (!MCPub.isPublished(p.id)) {
        if (confirm('Publish "' + p.name + '" to ALL users?\nIt appears in everyone\'s Programs tab within ~1 minute.')) doPublish();
      } else if (confirm('"' + p.name + '" is already live.\n\nOK — push this version as an update to all users.\nCancel — more options.')) {
        doPublish();
      } else if (confirm('Unpublish "' + p.name + '"?\nIt disappears from everyone\'s Programs tab (their logged history is kept).')) {
        btn.disabled = true; btn.textContent = 'Removing…';
        MCPub.unpublish(p.id).then(function () { btn.disabled = false; refreshLabel(); }, fail);
      }
    });
  })();

  // ✓ done = the day was finished within the trailing 7 days (logging history
  // is intentionally week-agnostic so "Last: X lb" cues carry across weeks)
  function doneMap() {
    var map = {};
    var cutoff = Date.now() - 7 * 24 * 3600 * 1000;
    try {
      (JSON.parse(localStorage.getItem('mc_workout_log_v1') || '[]') || []).forEach(function (e) {
        var dm = new RegExp('^cprog-' + p.id + '-d(\\d+)$').exec(e.pageId || '');
        if (dm && new Date(e.date || 0).getTime() >= cutoff) map[dm[1]] = true;
      });
    } catch (e) {}
    return map;
  }

  function render() {
    var tabs = '';
    for (var w = 1; w <= p.weeks; w++) {
      tabs += '<button class="wt' + (w === week ? ' on' : '') + '" data-w="' + w + '">Week ' + w + '</button>';
    }
    $('weekTabs').innerHTML = p.weeks > 1 ? tabs : '';

    var done = doneMap();
    $('dayList').innerHTML = p.days.map(function (d, i) {
      var n = d.exercises.length;
      var sets = d.exercises.reduce(function (s, e) { return s + (parseInt(e.sets, 10) || 0); }, 0);
      return '<a class="day-link" href="run-program.html?prog=' + p.id + '&w=' + week + '&d=' + (i + 1) + '">' +
        '<span class="dl-num">' + (i + 1) + '</span>' +
        '<span style="flex:1;min-width:0;"><span class="dl-name">' + d.name.replace(/</g, '&lt;') + '</span>' +
          '<div class="dl-meta">' + n + ' exercises · ' + sets + ' sets</div></span>' +
        (done[String(i + 1)] ? '<span class="dl-done">✓ done</span>' : '') +
        '<span class="dl-arrow">→</span></a>';
    }).join('');
    applyLayout();
  }

  // PM Phase 2b — apply the owner-selected landing/split layout to the day
  // list. timeline (landing) takes precedence over week-calendar (split);
  // neither set = the default list. Resolves via MC_LAYOUT once it loads.
  var SCOPE_ID = 'cprog-' + p.id;
  window.MC_VIEW_SCOPES = [
    { view: 'landing', id: SCOPE_ID, label: 'Program landing' },
    { view: 'split',   id: SCOPE_ID, label: 'Day list (split)' }
  ];
  function applyLayout() {
    var dl = $('dayList');
    if (!dl) return;
    dl.classList.remove('dl-timeline', 'dl-calendar');
    if (!window.MC_LAYOUT) return;
    var land = MC_LAYOUT.styleFor('landing', SCOPE_ID);
    var spl  = MC_LAYOUT.styleFor('split', SCOPE_ID);
    if (land === 'timeline') dl.classList.add('dl-timeline');
    else if (spl === 'week-calendar') dl.classList.add('dl-calendar');
  }
  document.addEventListener('mc:layout-changed', applyLayout);
  document.addEventListener('mc:names-changed', applyLayout);

  $('weekTabs').addEventListener('click', function (e) {
    var b = e.target.closest('.wt'); if (!b) return;
    week = parseInt(b.dataset.w, 10) || 1;
    render();
  });

  render();
  }
})();
</script>
<script src="mc-supabase.js"></script>
<script src="mc-sync.js"></script>
<script src="mc-resume.js"></script>
<script src="mc-nav.js"></script>
<script src="program-overrides.js"></script>
<script src="program-manager.js"></script>
<script src="mc-sw-update.js?v=45"></script>
</body></html>
