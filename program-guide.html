<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MC Training">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Program Guide — MC Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;min-height:100vh;color:#fff;padding-bottom:40px;}
.topbar{display:flex;align-items:center;gap:12px;padding:20px 18px 14px;position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,#0a0a0a 80%,transparent);}
.back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#111;border:1px solid rgba(255,255,255,0.1);color:#d4af37;font-size:16px;text-decoration:none;flex-shrink:0;}
.topbar-title{font-size:18px;font-weight:900;letter-spacing:-0.02em;}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.hero{background:linear-gradient(135deg,#0a1628,#020b18);border-bottom:1px solid rgba(212,175,55,0.15);padding:20px 18px 24px;margin-bottom:24px;}
.hero-eyebrow{font-size:11px;font-weight:900;letter-spacing:0.25em;color:#d4af37;text-transform:uppercase;margin-bottom:8px;}
.hero-title{font-size:28px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;}
.hero-sub{font-size:13px;color:#6b7280;line-height:1.5;}
.section{padding:0 18px;margin-bottom:8px;}
.section-label{font-size:11px;font-weight:900;letter-spacing:0.2em;color:#475569;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent);}
.prog-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.07);background:#111;text-decoration:none;color:#fff;transition:border-color 0.15s;position:relative;overflow:hidden;}
.prog-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,#d4af37);border-radius:0 2px 2px 0;}
.prog-card:active{border-color:var(--c,#d4af37);box-shadow:0 0 0 1px var(--c,#d4af37);}
.prog-icon{width:44px;height:44px;border-radius:12px;background:#161616;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.prog-info{flex:1;min-width:0;}
.prog-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-meta{font-size:11px;color:var(--muted);font-weight:600;}
.prog-forwho{font-size:11px;color:#94a3b8;font-weight:500;margin-top:4px;line-height:1.4;}
.prog-forwho b{color:#d4af37;font-weight:700;}
.prog-arrow{font-size:14px;color:#334155;flex-shrink:0;}
.no-guide{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.04);background:#0d0d0d;opacity:0.5;position:relative;overflow:hidden;}
.no-guide::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#334155;border-radius:0 2px 2px 0;}
.no-guide-tag{font-size:11px;background:#1a1a1a;color:#475569;border-radius:6px;padding:2px 8px;font-weight:700;letter-spacing:0.06em;}
</style>
<link rel="stylesheet" href="base.css?v=68"/>
<link rel="stylesheet" href="mc-nav.css"/>
<script src="mc-theme.js"></script>
  <link rel="stylesheet" href="mc-light.css">
</head>
<body>
<div class="topbar">
  <a href="dashboard.html" class="back">←</a>
  <div><div class="topbar-title">Program Guide</div><div class="topbar-sub">Instructions for every program</div></div>
</div>
<div class="hero">
  <div class="hero-eyebrow">📋 Training Reference</div>
  <h1 class="hero-title">Program Guide</h1>
  <p class="hero-sub" id="heroSub">Rules, set styles, rep ranges, and methodology for every program. Tap any program to open its full guide.</p>
</div>
<div class="section">
  <div class="section-label">All Programs</div>
  <div id="progGuideList"></div>
</div>
<script src="mc-pm-data.js"></script>
<script>
/* ── PROGRAM CARDS (data-driven — see Phase 3.3 consolidation) ──
   Renders from MC_PM_DATA.programs so a program only needs a guide entry
   here once it ships a <id>-instructions.html — no per-program HTML to
   hand-write, and the public market build automatically shows only the
   flagship programs since tools/build-market.py already strips the
   influencer entries out of MC_PM_DATA.programs itself (no MARKET:STRIP
   markers needed around any card markup in this file). NO_GUIDE_IDS is the
   one thing that can't be derived: which shipped programs don't have a
   guide page yet — currently just one influencer id, which is why that
   literal is itself MARKET:STRIP-wrapped below (it's inert in the market
   build since it's already absent from MC_PM_DATA.programs there, but the
   brand-term scan flags the bare substring's presence in any
   shipped file regardless of runtime reachability). */
(function () {
  var NO_GUIDE_IDS = [];
  var programs = (window.MC_PM_DATA && window.MC_PM_DATA.programs) || [];
  function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  var html = programs.map(function (p) {
    if (NO_GUIDE_IDS.indexOf(p.id) >= 0) {
      return '<div class="no-guide">' +
        '<div class="prog-icon" style="opacity:0.4;">' + p.icon + '</div>' +
        '<div class="prog-info"><div class="prog-name" style="color:#475569;">' + escHtml(p.name) + '</div>' +
        '<div class="prog-meta" style="margin-top:4px;"><span class="no-guide-tag">Guide coming soon</span></div></div>' +
      '</div>';
    }
    var forWho = p.forWho ? '<div class="prog-forwho"><b>Best for:</b> ' + escHtml(p.forWho) + '</div>' : '';
    return '<a href="' + p.id + '-instructions.html" class="prog-card" style="--c:' + p.color + ';">' +
      '<div class="prog-icon">' + p.icon + '</div>' +
      '<div class="prog-info"><div class="prog-name">' + escHtml(p.name) + '</div><div class="prog-meta">' + escHtml(p.desc) + '</div>' + forWho + '</div>' +
      '<div class="prog-arrow">→</div>' +
    '</a>';
  }).join('');
  var list = document.getElementById('progGuideList');
  if (list) list.innerHTML = html;
  // program count is computed at runtime from the rendered list, not
  // hardcoded, so it never drifts as programs are added/removed/stripped.
  var heroSub = document.getElementById('heroSub');
  if (heroSub) heroSub.textContent = 'Rules, set styles, rep ranges, and methodology for all ' + programs.length + ' programs. Tap any program to open its full guide.';
})();
</script>
<script>
/* ── SMART BACK NAV ── */
(function(){
  var back = sessionStorage.getItem('mc_back_to');
  if(!back) return;
  // Find all back links pointing to index/home and redirect to dashboard
  document.querySelectorAll('a').forEach(function(a){
    var href = a.getAttribute('href')||'';
    if(href === 'index.html' || href === '../' || href === '/' ||
       href.includes('index') || a.textContent.trim().startsWith('←')){
      a.href = back;
      a.addEventListener('click', function(){
        sessionStorage.removeItem('mc_back_to');
      });
    }
  });
})();
</script>
<script src="mc-nav.js"></script>
</body>
</html>
