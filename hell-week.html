<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hell Week</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;padding-bottom:40px;}
.app{background:linear-gradient(135deg,#3f0518 0%,#881337 50%,#3f0518 100%);min-height:100vh;}
.back-link{position:absolute;top:18px;left:18px;color:#fda4af;text-decoration:none;font-size:13px;font-weight:600;background:rgba(225,29,72,0.22);padding:6px 12px;border-radius:20px;border:1px solid rgba(225,29,72,0.5);z-index:10;}
.back-link:active{background:rgba(225,29,72,0.35);}
.header{background:linear-gradient(90deg,#881337,#3f0518);padding:60px 20px 22px;border-bottom:1px solid rgba(255,255,255,0.08);position:relative;}
.header-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.22em;color:#fda4af;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:30px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-0.02em;}
.no-quit{display:inline-block;background:rgba(225,29,72,0.22);border:1px solid rgba(225,29,72,0.5);border-radius:6px;padding:5px 12px;font-size:12px;color:#fecdd3;font-weight:700;}

/* week sub-tabs */
.tabs-bar{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 12px;position:sticky;top:0;z-index:30;}
.tabs{max-width:680px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;}
.tab{padding:13px 14px;border:none;cursor:pointer;font-weight:800;font-size:13px;background:transparent;color:#92857a;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:0.02em;-webkit-tap-highlight-color:transparent;}
.tab.active{color:#f43f5e;border-bottom-color:#f43f5e;}

.content{max-width:680px;margin:20px auto 0;padding:0 16px;}
.block-rules{background:rgba(0,0,0,0.25);border:1px solid rgba(225,29,72,0.3);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px 14px;}
.br-item{font-size:11px;font-weight:800;color:#fecdd3;letter-spacing:0.02em;}
.br-item b{color:#fff;}

.section-card{background:#fff;border-radius:16px;margin-bottom:18px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow:hidden;}
.runner-head{background:linear-gradient(135deg,#9f1239,#881337);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.runner-eyebrow{font-size:11px;font-weight:800;letter-spacing:0.18em;color:#fecdd3;text-transform:uppercase;}
.runner-round{font-size:19px;font-weight:900;letter-spacing:-0.01em;}
.head-pill{font-size:11px;font-weight:900;letter-spacing:0.06em;background:rgba(0,0,0,0.28);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 10px;border-radius:20px;white-space:nowrap;}
.runner-body{padding:18px;}

/* round map */
.round-map{display:flex;flex-direction:column;gap:5px;background:#fff1f2;border:1px solid #fecdd3;border-radius:12px;padding:10px 12px;margin-bottom:16px;}
.rm-item{display:flex;align-items:center;gap:9px;font-size:12px;color:#6b7280;font-weight:600;}
.rm-item.cur{color:#9f1239;font-weight:900;}
.rm-item.done{color:#16a34a;}
.rm-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#fff;border:1.5px solid #fecdd3;font-size:10px;font-weight:900;color:#9f1239;flex-shrink:0;}
.rm-item.cur .rm-num{background:#e11d48;color:#fff;border-color:#e11d48;}
.rm-item.done .rm-num{background:#16a34a;color:#fff;border-color:#16a34a;}

/* generic engine display */
.eng{text-align:center;}
.eng-tag{font-size:12px;font-weight:900;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;}
.eng-tag.work{color:#e11d48;}
.eng-tag.rest{color:#ea580c;}
.eng-name{font-size:25px;font-weight:900;color:#881337;letter-spacing:-0.01em;line-height:1.15;margin-bottom:10px;}
.eng-name.rest{color:#c2410c;}
.timer-big{font-size:62px;font-weight:900;color:#e11d48;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1;margin-bottom:12px;}
.timer-big.rest{color:#ea580c;}
.timer-bar{height:10px;background:#fff1f2;border-radius:5px;overflow:hidden;margin-bottom:16px;}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,#fb7185,#e11d48);border-radius:5px;transition:width .25s linear;}
.timer-bar-fill.rest{background:linear-gradient(90deg,#f97316,#e11d48);}
.next-up{font-size:13px;font-weight:800;color:#9f1239;margin-bottom:14px;}
.next-up b{color:#e11d48;}

/* counters (AMRAP / fixed / hybrid) */
.counter-cap{font-size:12px;font-weight:700;color:#9f1239;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;}
.counter-big{display:flex;align-items:center;justify-content:center;gap:14px;margin:2px 0 4px;}
.counter-num{min-width:96px;text-align:center;font-size:46px;font-weight:900;color:#881337;font-variant-numeric:tabular-nums;border:none;outline:none;font-family:inherit;background:transparent;-webkit-tap-highlight-color:transparent;}
.counter-num:focus{color:#e11d48;}
.counter-num::-webkit-outer-spin-button,.counter-num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.big-step{width:52px;height:52px;border-radius:14px;border:2px solid #fecdd3;background:#fff;color:#be123c;font-size:26px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.big-step:active{background:#fff1f2;transform:scale(0.96);}
.hybrid-grid{display:flex;gap:10px;margin-bottom:6px;}
.hybrid-col{flex:1;background:#fff1f2;border:1px solid #fecdd3;border-radius:12px;padding:10px 8px;}
.hybrid-col .hc-name{font-size:11px;font-weight:800;color:#9f1239;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}
.hybrid-col .counter-num{font-size:34px;min-width:54px;}
.hybrid-col .big-step{width:40px;height:40px;font-size:20px;border-radius:11px;}
.hybrid-col .counter-big{gap:8px;}

/* buttons */
.eng-btn{width:100%;padding:16px;border-radius:13px;border:none;font-size:16px;font-weight:900;letter-spacing:0.03em;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;color:#fff;}
.eng-btn.go{background:linear-gradient(135deg,#e11d48,#881337);box-shadow:0 4px 16px rgba(225,29,72,0.35);}
.eng-btn.done{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 4px 16px rgba(22,163,74,0.3);}
.eng-btn.ghost{background:#fff1f2;color:#9f1239;border:1.5px solid #fecdd3;}
.eng-btn:active{transform:scale(0.99);}
.eng-ctrls{display:flex;gap:8px;margin-top:12px;}
.eng-ctrls button{flex:1;padding:12px;border-radius:11px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.ctrl-skip{background:#fff1f2;color:#9f1239;border:1.5px solid #fecdd3;}
.ctrl-stop{background:#fee2e2;color:#dc2626;border:1.5px solid #fecaca;}
.eng-btn + .eng-btn{margin-top:10px;}

/* round-rest picker */
.rest-pick{display:flex;gap:8px;margin-bottom:14px;}
.rest-pick .rp{flex:1;padding:10px 6px;border-radius:10px;font-size:12px;font-weight:900;border:1.5px solid #fecdd3;background:#fff;color:#9f1239;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.rest-pick .rp.on{background:#ffe4e6;border-color:#e11d48;color:#9f1239;}

/* finisher */
.fin-card{background:#fff1f2;border:1px solid #fecdd3;border-radius:13px;padding:14px;margin-bottom:12px;}
.fin-card-hd{font-size:13px;font-weight:900;color:#9f1239;margin-bottom:10px;letter-spacing:0.02em;}
.entry-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.entry-label{font-size:12px;font-weight:800;color:#9f1239;}
.stepper{display:flex;align-items:center;gap:8px;}
.step-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid #fecdd3;background:#fff;color:#be123c;font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.step-btn:active{background:#ffe4e6;}
.num-input{width:80px;padding:8px 6px;border:1.5px solid #fecdd3;border-radius:10px;color:#881337;font-size:18px;font-weight:900;text-align:center;font-family:inherit;outline:none;background:#fff;}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.fin-cap{font-size:11px;font-weight:700;color:#9f1239;margin-top:6px;}
.sauna-time{font-size:40px;font-weight:900;color:#e11d48;font-variant-numeric:tabular-nums;text-align:center;margin:4px 0 8px;line-height:1;}
.sauna-bar{height:8px;background:#ffe4e6;border-radius:4px;overflow:hidden;margin-bottom:10px;}
.sauna-bar-fill{height:100%;background:linear-gradient(90deg,#f97316,#e11d48);border-radius:4px;transition:width .25s linear;}
.toggle-done{width:100%;padding:11px;border-radius:10px;border:1.5px solid #fecdd3;background:#fff;color:#9f1239;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;margin-top:8px;}
.toggle-done.on{background:#dcfce7;border-color:#16a34a;color:#15803d;}

.done-banner{text-align:center;background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:1px solid #86efac;border-radius:13px;padding:18px;margin-bottom:14px;}
.done-banner .db-title{font-size:19px;font-weight:900;color:#15803d;}
.done-banner .db-sub{font-size:12px;font-weight:700;color:#166534;margin-top:4px;}

.intro-rules{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.intro-rules li{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#374151;line-height:1.5;}
.intro-rules li::before{content:"▸";color:#e11d48;font-weight:900;flex-shrink:0;}
.intro-rules strong{color:#9f1239;}

/* total + summary */
.total-card{background:linear-gradient(135deg,#e11d48,#881337);border-radius:16px;padding:20px;text-align:center;margin-top:4px;box-shadow:0 4px 20px rgba(225,29,72,0.15);}
.total-label{font-size:11px;font-weight:800;letter-spacing:0.2em;color:#fecdd3;text-transform:uppercase;margin-bottom:6px;}
.total-value{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.02em;line-height:1.3;}
.sum-section{margin:28px auto 0;max-width:680px;padding:0 16px 8px;}
.sum-hd{font-size:11px;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:#fb7185;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sum-card{border-radius:14px;padding:16px;background:#0f0f0f;border:1px solid rgba(225,29,72,0.25);}
.sum-sub{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;color:#fb7185;}
.sum-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(225,29,72,0.12);}
.sum-row:last-of-type{border-bottom:none;}
.sum-ico{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
.sum-nm{flex:1;font-size:12px;font-weight:600;color:#e2e8f0;}
.sum-dt{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.sum-st{font-size:11px;font-weight:900;color:#fb7185;}
.sum-rp{font-size:11px;font-weight:600;color:#94a3b8;}
.sum-div{height:1px;margin:14px 0;background:rgba(225,29,72,0.18);}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sum-tot{border-radius:10px;padding:12px 8px;text-align:center;background:rgba(225,29,72,0.1);border:1px solid rgba(225,29,72,0.2);}
.sum-tv{font-size:18px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;}
.sum-tl{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;color:#fb7185;}

/* finish-workout */
.fw-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(10,10,10,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.07);z-index:40;display:flex;gap:10px;align-items:center;}
.fw-btn{flex:1;padding:13px;background:#d4af37;border:none;border-radius:12px;color:#000;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:0.03em;-webkit-tap-highlight-color:transparent;}
.fw-btn:active{opacity:0.85;transform:scale(0.98);}
.fw-progress{font-size:11px;font-weight:700;color:#94a3b8;white-space:nowrap;letter-spacing:0.04em;}
.fw-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);display:none;align-items:flex-end;padding:16px;z-index:60;}
.fw-modal-overlay.open{display:flex;}
.fw-modal{width:100%;max-width:648px;margin:0 auto;background:#0e0e0e;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px 20px 20px;}
.fw-modal-title{font-size:20px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px;color:#fff;}
.fw-modal-sub{font-size:13px;color:#64748b;margin-bottom:18px;line-height:1.5;}
.fw-summary{background:#111;border-radius:12px;padding:14px;margin-bottom:16px;}
.fw-summary-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;}
.fw-summary-row:last-child{border-bottom:none;}
.fw-summary-label{color:#64748b;font-weight:600;}
.fw-summary-val{color:#fff;font-weight:800;}
.fw-modal-btns{display:flex;gap:10px;}
.fw-cancel{flex:1;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.fw-confirm{flex:2;padding:12px;background:#d4af37;border:none;border-radius:12px;color:#000;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;}
.fw-auto-banner{position:fixed;top:0;left:0;right:0;background:rgba(52,211,153,0.12);border-bottom:1px solid rgba(52,211,153,0.3);padding:12px 16px;text-align:center;font-size:13px;font-weight:800;color:#34d399;z-index:50;display:none;cursor:pointer;}
.fw-auto-banner.show{display:block;}
.swap-badge{font-size:10px;font-weight:900;color:#fff;background:#e11d48;border-radius:8px;padding:1px 6px;vertical-align:middle;}
</style>

<body class="cond-elite">
<div class="app">
  <div class="header">
    <a href="cat-faint.html" class="back-link">← Back</a>
    <div class="header-inner">
      <div class="eyebrow">💀 Brutal Conditioning · 4-Week Block</div>
      <div class="title">Hell Week</div>
      <div><span class="no-quit">🔥 NO QUITTING</span></div>
    </div>
  </div>
  <div class="tabs-bar"><div class="tabs" id="tabs"></div></div>
  <div class="content">
    <div class="block-rules" id="blockRules"></div>
    <div class="section-card"><div id="runner"></div></div>
    <div class="total-card">
      <div class="total-label">Workout Total</div>
      <div class="total-value" id="totalValue">—</div>
    </div>
  </div>
</div>

<div class="sum-section">
  <div class="sum-hd">📊 Workout Summary
    <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(251,113,133,0.35),transparent);display:block;margin-left:8px;"></span>
  </div>
  <div class="sum-card">
    <div class="sum-sub" id="sumSub">Hell Week · Basic</div>
    <div class="sum-row"><span class="sum-ico">🔁</span><span class="sum-nm">Rounds completed</span><div class="sum-dt"><span class="sum-st" id="sumRoundSt">0 / 3</span><span class="sum-rp" id="sumRoundRp">7 exercises each</span></div></div>
    <div class="sum-row"><span class="sum-ico">💪</span><span class="sum-nm">Reps logged (AMRAP + reps)</span><div class="sum-dt"><span class="sum-st" id="sumRepSt">0 reps</span><span class="sum-rp" id="sumRepRp">pull-ups · pushups · lunges …</span></div></div>
    <div class="sum-div"></div>
    <div class="sum-grid">
      <div class="sum-tot"><div class="sum-tv" id="gReps">0</div><div class="sum-tl">Total Reps</div></div>

      <div class="sum-tot"><div class="sum-tv" id="gTime">0:00</div><div class="sum-tl">Active Time</div></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   HELL WEEK — 4-week progressive interval engine
   ════════════════════════════════════════════════════════════ */
var PID  = location.pathname.split('/').pop().replace('.html','') || 'hell-week';
var SKEY = 'hellweek_state_v1';

var BLOCKS = {
  basic:    {key:'basic',    label:'Basic',     sub:'Week 1', rounds:3, exDur:30, moveRest:30, roundRest:90,  jump:180, lunges:50,  heelsAmrap:false, pushupTimed:false, finisher:false},
  inter1:   {key:'inter1',   label:'Inter. I',  sub:'Week 2', rounds:5, exDur:30, moveRest:30, roundRest:90,  jump:120, lunges:50,  heelsAmrap:true,  pushupTimed:false, finisher:false},
  inter2:   {key:'inter2',   label:'Inter. II', sub:'Week 3', rounds:3, exDur:60, moveRest:30, roundRest:120, jump:300, lunges:100, heelsAmrap:false, pushupTimed:false, finisher:false},
  advanced: {key:'advanced', label:'Advanced',  sub:'Week 4', rounds:5, exDur:60, moveRest:30, roundRest:150, roundRestPick:true, jump:180, lunges:100, heelsAmrap:false, pushupTimed:true, finisher:true}
};
var TAB_ORDER = ['basic','inter1','inter2','advanced'];

function roundExercises(B){
  return [
    {key:'jump',    name:'Jump Rope',        type:'timed', dur:B.jump,   note:(B.jump/60)+' min'},
    {key:'pullups', name:'Pull-ups',         type:'amrap'},
    {key:'pushups', name:'Pushups',          type:B.pushupTimed?'timed':'amrap', dur:B.exDur, note:'1 min max'},
    {key:'squat',   name:'Squat Jumps',      type:'timed', dur:B.exDur},
    {key:'heels',   name:'Heels to Heaven',  type:B.heelsAmrap?'amrap':'timed', dur:B.exDur},
    {key:'hybrid',  name:'Hybrid Card',      type:'hybrid'},
    {key:'lunges',  name:B.lunges+' Walking Lunges', type:'fixed', reps:B.lunges}
  ];
}
function swapName(key,def){ return window.MCSwap?MCSwap.name(key,def):def; }
function exBadge(ex){
  var keys = ex.key==='hybrid'?['mc','kb']:[ex.key];
  var sw = keys.some(function(k){ return window.MCSwap&&MCSwap.isSwapped(k); });
  return sw?' <span class="swap-badge">⇄</span>':'';
}
function exShort(ex){
  if(ex.key==='hybrid') return '25 '+swapName('mc','Mountain Climbers')+' + 25 '+swapName('kb','Kettlebell Thrusts');
  if(ex.key==='pullups') return swapName('pullups','Pull-ups')+' (AMRAP)';
  if(ex.key==='pushups') return swapName('pushups','Pushups')+(ex.type==='timed'?' (1 min max)':' (AMRAP)');
  if(ex.key==='squat')   return swapName('squat','Squat Jumps');
  if(ex.key==='heels')   return swapName('heels','Heels to Heaven')+(ex.type==='amrap'?' (AMRAP)':'');
  if(ex.key==='jump')    return swapName('jump','Jump Rope')+(ex.note?' ('+ex.note+')':'');
  if(ex.key==='lunges')  return curB().lunges+' '+swapName('lunges','Walking Lunges');
  return ex.name;
}

function freshBlock(){
  return {started:false, round:1, exIndex:0,
    log:{pullups:0,pushups:0,heels:0,mc:0,kb:0,lunges:0},
    roundRestSel:150, finisher:{rowMeters:2000,rowDone:false,saunaDone:false}, done:false};
}
var DEFAULT_STATE = {
  activeTab:'basic',
  hell:{basic:freshBlock(),inter1:freshBlock(),inter2:freshBlock(),advanced:freshBlock()},
  elapsedMs:0, timeStarted:false
};
var S = loadState();

function loadState(){
  try{ var raw=JSON.parse(localStorage.getItem(SKEY)||'null'); if(raw && raw.hell && raw.hell.basic) return raw; }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function persist(){ try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} }

function cur(){ return S.hell[S.activeTab]; }
function curB(){ return BLOCKS[S.activeTab]; }
function curEX(){ return roundExercises(curB()); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmtClock(s){ s=Math.max(0,s); return Math.floor(s/60)+':'+pad(s%60); }

function buzz(){
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
  try{ var ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(function(t,i){ var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
      o.frequency.value=i===2?880:660;o.type='sine';g.gain.setValueAtTime(0.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.25);});
  }catch(e){}
}

/* ════════ GLOBAL ELAPSED TIME ════════ */
var GT = { iv:null, since:0, ctr:0,
  start:function(){ if(!S.timeStarted){ S.timeStarted=true; persist(); } this.resume(); },
  resume:function(){ if(this.iv) return; this.since=Date.now(); var self=this;
    this.iv=setInterval(function(){ S.elapsedMs+=Date.now()-self.since; self.since=Date.now(); recompute(); if(++self.ctr%5===0) persist(); },1000); }
};

/* ════════ METRICS ════════ */
function metrics(){
  var c=cur(), B=curB(), L=c.log;
  var reps=L.pullups+L.pushups+L.heels+L.mc+L.kb+L.lunges;
  var roundsDone = c.done ? B.rounds : (c.round-1) + (c.exIndex>=7?1:0);
  var exDone = c.done ? B.rounds*7 : (c.round-1)*7 + c.exIndex;
  return {reps:reps, roundsDone:roundsDone, rounds:B.rounds, exDone:exDone,
    done:c.done, elapsed:Math.floor(S.elapsedMs/1000)};
}

/* ════════ TABS ════════ */
function renderTabs(){
  document.getElementById('tabs').innerHTML = TAB_ORDER.map(function(k){
    return '<button class="tab'+(S.activeTab===k?' active':'')+'" onclick="switchTab(\''+k+'\')">'+BLOCKS[k].label+'</button>';
  }).join('');
}
function switchTab(k){
  if(S.activeTab===k) return;
  HELL._stop(); SAUNA.pause(); HELL.phase='idle';
  S.activeTab=k; persist();
  render();
}
function renderRules(){
  var B=curB();
  var rr = B.roundRestPick ? '2–3 min (pick)' : (B.roundRest/60>=1?(B.roundRest/60)+' min':B.roundRest+'s');
  document.getElementById('blockRules').innerHTML =
    '<span class="br-item"><b>'+B.rounds+'</b> Rounds</span>'+
    '<span class="br-item"><b>'+(B.exDur)+'s</b> work</span>'+
    '<span class="br-item"><b>'+B.moveRest+'s</b> move rest</span>'+
    '<span class="br-item"><b>'+rr+'</b> round rest</span>'+
    '<span class="br-item"><b>'+(B.jump/60)+' min</b> rope start</span>';
}

/* ════════ THE INTERVAL ENGINE ════════ */
var HELL = {
  iv:null, phase:'idle', endAt:0, work:0, work2:0,

  _stop:function(){ if(this.iv){ clearInterval(this.iv); this.iv=null; } },
  _count:function(secs,total,onDone){
    this._stop(); this.endAt=Date.now()+secs*1000; var self=this;
    function tick(){
      var rem=Math.ceil((self.endAt-Date.now())/1000);
      var t=document.getElementById('hellTime'), b=document.getElementById('hellBar');
      if(rem>0){ if(t)t.textContent=fmtClock(rem); if(b)b.style.width=(rem/total*100)+'%'; }
      else { self._stop(); buzz(); var t2=document.getElementById('hellTime'); if(t2)t2.textContent=fmtClock(0); if(onDone)onDone(); }
    }
    tick(); this.iv=setInterval(tick,200);
  },

  startRound:function(){ GT.start(); cur().started=true; persist(); this.enterExercise(); },

  enterExercise:function(){
    var ex=curEX()[cur().exIndex];
    if(ex.type==='timed'){ this.phase='timed'; renderRunner(); this._count(ex.dur,ex.dur,function(){ HELL.completeExercise(); }); }
    else {
      this.phase='log';
      if(ex.type==='hybrid'){ this.work=25; this.work2=25; }
      else if(ex.type==='fixed'){ this.work=ex.reps; }
      else { this.work=0; }
      renderRunner();
    }
  },

  completeExercise:function(){
    var c=cur(), B=curB();
    c.exIndex++; persist(); recompute();   // advance to next slot (0→7)
    if(c.exIndex>=7){ if(c.round<B.rounds){ this.enterRoundRest(); } else { this.endBlock(); } }
    else { this.enterMoveRest(); }
  },

  enterMoveRest:function(){
    this.phase='moveRest'; renderRunner();
    var d=curB().moveRest; this._count(d,d,function(){ HELL.enterExercise(); });
  },

  enterRoundRest:function(){
    this.phase='roundRest';
    var B=curB(); var d=B.roundRestPick?(cur().roundRestSel||150):B.roundRest;
    renderRunner();
    this._count(d,d,function(){ var c=cur(); c.round++; c.exIndex=0; persist(); HELL.phase='idle'; renderRunner(); recompute(); });
  },

  endBlock:function(){
    var c=cur(); c.done=true; persist(); recompute();
    this.phase = curB().finisher ? 'finisher' : 'done';
    renderRunner();
  },

  skip:function(){
    this._stop();
    if(this.phase==='timed'){ this.completeExercise(); }
    else if(this.phase==='moveRest'){ this.enterExercise(); }
    else if(this.phase==='roundRest'){ var c=cur(); c.round++; c.exIndex=0; persist(); this.phase='idle'; renderRunner(); recompute(); }
  },
  stop:function(){
    this._stop();
    if(this.phase==='roundRest'){ var c=cur(); c.round++; c.exIndex=0; persist(); recompute(); }
    this.phase='idle'; renderRunner();
  }
};

/* counters (log phase) */
function hellAdjust(d){ HELL.work=Math.max(0,HELL.work+d); var el=document.getElementById('hellCount'); if(el)el.value=HELL.work; }
function hellInput(){ HELL.work=Math.max(0,parseInt(document.getElementById('hellCount').value)||0); }
function hellAdjust2(d){ HELL.work2=Math.max(0,HELL.work2+d); var el=document.getElementById('hellCount2'); if(el)el.value=HELL.work2; }
function hellInput2(){ HELL.work2=Math.max(0,parseInt(document.getElementById('hellCount2').value)||0); }
function hellComplete(){
  var ex=curEX()[cur().exIndex], L=cur().log;
  if(ex.type==='amrap'){ L[ex.key]=(L[ex.key]||0)+HELL.work; }
  else if(ex.type==='fixed'){ L.lunges+=HELL.work; }
  else if(ex.type==='hybrid'){ L.mc+=HELL.work; L.kb+=HELL.work2; }
  persist(); recompute();
  HELL.completeExercise();
}

/* advanced round-rest picker */
function setRoundRest(sec){
  cur().roundRestSel=sec; persist();
  if(HELL.phase==='roundRest'){ renderRunner(); HELL._count(sec,sec,function(){ var c=cur(); c.round++; c.exIndex=0; persist(); HELL.phase='idle'; renderRunner(); recompute(); }); }
  else renderRunner();
}

function resetBlock(){ HELL._stop(); SAUNA.pause(); S.hell[S.activeTab]=freshBlock(); HELL.phase='idle'; persist(); render(); }

/* ════════ FINISHER: row + sauna ════════ */
var SAUNA = { iv:null, total:600, rem:600,
  toggle:function(){ if(this.iv) this.pause(); else this.start(); },
  start:function(){ GT.start(); this._stop(); this.endAt=Date.now()+this.rem*1000; var self=this;
    this.iv=setInterval(function(){ var r=Math.ceil((self.endAt-Date.now())/1000);
      var t=document.getElementById('saunaTime'),b=document.getElementById('saunaBar');
      if(r>0){ self.rem=r; if(t)t.textContent=fmtClock(r); if(b)b.style.width=(r/self.total*100)+'%'; }
      else { self._stop(); self.rem=0; buzz(); cur().finisher.saunaDone=true; persist(); renderRunner(); }
    },250); this._btn(true); },
  pause:function(){ this._stop(); this._btn(false); },
  _stop:function(){ if(this.iv){ clearInterval(this.iv); this.iv=null; } },
  _btn:function(run){ var b=document.getElementById('saunaBtn'); if(b)b.textContent=run?'⏸ Pause':'▶ Start'; }
};
function rowAdjust(d){ var f=cur().finisher; f.rowMeters=Math.max(0,(f.rowMeters||0)+d); persist(); var el=document.getElementById('rowMeters'); if(el)el.value=f.rowMeters; recompute(); }
function rowInput(){ cur().finisher.rowMeters=Math.max(0,parseInt(document.getElementById('rowMeters').value)||0); persist(); recompute(); }
function toggleRow(){ cur().finisher.rowDone=!cur().finisher.rowDone; persist(); renderRunner(); }
function toggleSaunaDone(){ cur().finisher.saunaDone=!cur().finisher.saunaDone; if(cur().finisher.saunaDone) SAUNA.pause(); persist(); renderRunner(); }
function finishBlock(){ HELL.phase='done'; renderRunner(); recompute(); }

/* ════════ RENDER RUNNER ════════ */
function roundMapHTML(){
  var EX=curEX(), idx=cur().exIndex, ph=HELL.phase;
  return '<div class="round-map">'+EX.map(function(ex,i){
    var st = i<idx ? 'done' : (i===idx && ph!=='roundRest' && ph!=='idle' && ph!=='done' && ph!=='finisher' ? 'cur' : '');
    return '<div class="rm-item '+st+'"><span class="rm-num">'+(i+1)+'</span><span class="rm-nm">'+exShort(ex)+'</span></div>';
  }).join('')+'</div>';
}
function headHTML(){
  var c=cur(), B=curB();
  return '<div class="runner-head"><div><div class="runner-eyebrow">'+B.label+' · '+B.sub+'</div>'+
    '<div class="runner-round">Round '+Math.min(c.round,B.rounds)+' / '+B.rounds+'</div></div>'+
    '<span class="head-pill">Ex '+Math.min(c.exIndex+1,7)+'/7</span></div>';
}

function renderRunner(){
  var c=cur(), B=curB(), ph=HELL.phase, EX=curEX(), body;

  if(ph==='done' || (c.done && ph!=='finisher')){
    body='<div class="done-banner"><div class="db-title">🏆 '+B.label+' Complete</div>'+
      '<div class="db-sub">'+B.rounds+' rounds survived · '+metrics().reps+' reps logged</div></div>'+
      '<button class="eng-btn ghost" onclick="resetBlock()">↺ Restart '+B.label+'</button>';
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }

  if(ph==='finisher'){
    var f=c.finisher;
    body='<div class="eng"><div class="eng-tag work">🔥 Advanced Finisher</div>'+
      '<div class="eng-name">Row + Sauna</div></div>'+
      '<div class="fin-card"><div class="fin-card-hd">🚣 Row</div>'+
        '<div class="entry-row"><span class="entry-label">Meters</span>'+
          '<div class="stepper"><button class="step-btn" onclick="rowAdjust(-100)">−</button>'+
          '<input class="num-input" id="rowMeters" type="number" inputmode="numeric" value="'+f.rowMeters+'" onfocus="this.select()" oninput="rowInput()">'+
          '<button class="step-btn" onclick="rowAdjust(100)">+</button></div></div>'+
        '<div class="fin-cap">Target: 2000–4000 m</div>'+
        '<button class="toggle-done'+(f.rowDone?' on':'')+'" onclick="toggleRow()">'+(f.rowDone?'✓ Row logged':'Mark Row Done')+'</button>'+
      '</div>'+
      '<div class="fin-card"><div class="fin-card-hd">🧖 Sauna · 10:00</div>'+
        '<div class="sauna-time" id="saunaTime">'+fmtClock(SAUNA.rem)+'</div>'+
        '<div class="sauna-bar"><div class="sauna-bar-fill" id="saunaBar" style="width:'+(SAUNA.rem/SAUNA.total*100)+'%"></div></div>'+
        '<button class="eng-btn ghost" id="saunaBtn" onclick="SAUNA.toggle()">▶ Start</button>'+
        '<button class="toggle-done'+(f.saunaDone?' on':'')+'" onclick="toggleSaunaDone()">'+(f.saunaDone?'✓ Sauna done':'Mark Sauna Done')+'</button>'+
      '</div>'+
      '<button class="eng-btn done" onclick="finishBlock()">🏁 Finish Hell Week</button>';
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }

  if(ph==='idle'){
    var label, intro='';
    if(!c.started){ label='▶ Start Round 1';
      intro='<ul class="intro-rules">'+
        '<li><strong>'+B.rounds+' rounds.</strong> Complete the 7-exercise circuit each round, in order.</li>'+
        '<li><strong>'+B.exDur+'s</strong> per timed movement · <strong>'+B.moveRest+'s</strong> rest between movements.</li>'+
        '<li>AMRAP movements: log every rep. Timed movements: max effort to 00:00.</li>'+
        '<li><strong>NO QUITTING.</strong></li></ul>';
    } else if(c.exIndex===0){ label='▶ Start Round '+c.round; }
    else { label='▶ Resume Round '+c.round+' · Ex '+(c.exIndex+1); }
    body=roundMapHTML()+intro+'<button class="eng-btn go" onclick="HELL.startRound()">'+label+'</button>'+
      (c.started?'<button class="eng-btn ghost" onclick="resetBlock()">↺ Reset Block</button>':'');
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }

  var ex=EX[c.exIndex];

  if(ph==='timed'){
    body=roundMapHTML()+'<div class="eng">'+
      '<div class="eng-tag work">Round '+c.round+' · Max Effort</div>'+
      '<div class="eng-name">'+exShort(ex)+exBadge(ex)+'</div>'+
      '<div class="timer-big" id="hellTime">'+fmtClock(ex.dur)+'</div>'+
      '<div class="timer-bar"><div class="timer-bar-fill" id="hellBar" style="width:100%"></div></div>'+
      '<div class="eng-ctrls"><button class="ctrl-skip" onclick="HELL.skip()">⏭ Skip</button>'+
        '<button class="ctrl-stop" onclick="HELL.stop()">⏹ Stop</button></div>'+
    '</div>';
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }

  if(ph==='moveRest'){
    var nextEx=EX[c.exIndex];
    body=roundMapHTML()+'<div class="eng">'+
      '<div class="eng-tag rest">Rest · '+B.moveRest+'s</div>'+
      '<div class="eng-name rest">Next Up: '+exShort(nextEx)+'</div>'+
      '<div class="timer-big rest" id="hellTime">'+fmtClock(B.moveRest)+'</div>'+
      '<div class="timer-bar"><div class="timer-bar-fill rest" id="hellBar" style="width:100%"></div></div>'+
      '<div class="eng-ctrls"><button class="ctrl-skip" onclick="HELL.skip()">⏭ Skip Rest</button>'+
        '<button class="ctrl-stop" onclick="HELL.stop()">⏹ Stop</button></div>'+
    '</div>';
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }

  if(ph==='roundRest'){
    var d=B.roundRestPick?(c.roundRestSel||150):B.roundRest;
    var pick = B.roundRestPick ? '<div class="rest-pick">'+[120,150,180].map(function(s){
        return '<button class="rp'+(c.roundRestSel===s?' on':'')+'" onclick="setRoundRest('+s+')">'+fmtClock(s)+'</button>';
      }).join('')+'</div>' : '';
    body='<div class="eng">'+
      '<div class="eng-tag rest">Round '+c.round+' Complete · Round Rest</div>'+
      '<div class="eng-name rest">Round '+(c.round+1)+' next</div>'+
      '<div class="timer-big rest" id="hellTime">'+fmtClock(d)+'</div>'+
      '<div class="timer-bar"><div class="timer-bar-fill rest" id="hellBar" style="width:100%"></div></div>'+
      pick+
      '<div class="eng-ctrls"><button class="ctrl-skip" onclick="HELL.skip()">⏭ Skip to Round '+(c.round+1)+'</button>'+
        '<button class="ctrl-stop" onclick="HELL.stop()">⏹ Stop</button></div>'+
    '</div>';
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }

  if(ph==='log'){
    var inner;
    if(ex.type==='hybrid'){
      inner='<div class="counter-cap">Hybrid Card · log actual reps</div>'+
        '<div class="hybrid-grid">'+
          '<div class="hybrid-col"><div class="hc-name">Mtn Climbers</div><div class="counter-big">'+
            '<button class="big-step" onclick="hellAdjust(-5)">−</button>'+
            '<input class="counter-num" id="hellCount" type="number" inputmode="numeric" value="'+HELL.work+'" onfocus="this.select()" oninput="hellInput()">'+
            '<button class="big-step" onclick="hellAdjust(5)">+</button></div></div>'+
          '<div class="hybrid-col"><div class="hc-name">KB Thrusts</div><div class="counter-big">'+
            '<button class="big-step" onclick="hellAdjust2(-5)">−</button>'+
            '<input class="counter-num" id="hellCount2" type="number" inputmode="numeric" value="'+HELL.work2+'" onfocus="this.select()" oninput="hellInput2()">'+
            '<button class="big-step" onclick="hellAdjust2(5)">+</button></div></div>'+
        '</div>';
    } else {
      var cap = ex.type==='amrap' ? 'AMRAP · log every rep' : 'Target '+ex.reps+' · log actual reps';
      var stepN = ex.type==='fixed'?5:1;
      inner='<div class="counter-cap">'+cap+'</div>'+
        '<div class="counter-big"><button class="big-step" onclick="hellAdjust(-'+stepN+')">−</button>'+
        '<input class="counter-num" id="hellCount" type="number" inputmode="numeric" value="'+HELL.work+'" onfocus="this.select()" oninput="hellInput()">'+
        '<button class="big-step" onclick="hellAdjust('+stepN+')">+</button></div>';
    }
    body=roundMapHTML()+'<div class="eng">'+
      '<div class="eng-tag work">Round '+c.round+' · '+(ex.type==='amrap'?'AMRAP':'Reps')+'</div>'+
      '<div class="eng-name">'+exShort(ex)+exBadge(ex)+'</div>'+inner+
      '<button class="eng-btn done" style="margin-top:14px" onclick="hellComplete()">✓ Complete '+(ex.key==='lunges'||ex.key==='hybrid'?'':'· log reps')+'</button>'+
      '<button class="eng-btn ghost" onclick="HELL.stop()">⏹ Stop</button>'+
    '</div>';
    setRunner(headHTML()+'<div class="runner-body">'+body+'</div>'); return;
  }
}
function setRunner(html){ document.getElementById('runner').innerHTML=html; }

/* ════════ SUMMARY ════════ */
function recompute(){
  var m=metrics(), B=curB(), L=cur().log;
  document.getElementById('totalValue').textContent =
    m.reps+' reps · Round '+m.roundsDone+'/'+m.rounds+' · '+fmtClock(m.elapsed)+' active';
