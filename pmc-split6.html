<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MC Training">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>PMC – Split #6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;color:#fff;padding:0 0 60px;}
.back-link{display:inline-block;color:#a3e635;text-decoration:none;font-size:13px;font-weight:700;background:rgba(163,230,53,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(163,230,53,0.3);margin:20px 16px;letter-spacing:0.04em;}
.hero{background:linear-gradient(135deg,#0a1f00,#0d0618);padding:28px 20px 24px;border-bottom:1px solid rgba(163,230,53,0.15);}
.hero-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:900;letter-spacing:0.28em;color:#a3e635;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.02em;margin-bottom:4px;}
.subtitle{font-size:12px;color:#6b7280;line-height:1.5;}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.pill{background:rgba(163,230,53,0.1);border:1px solid rgba(163,230,53,0.2);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;color:#a3e635;letter-spacing:0.06em;text-transform:uppercase;}
.content{max-width:680px;margin:20px auto 0;padding:0 16px;}
.section-head{font-size:11px;font-weight:900;letter-spacing:0.22em;color:#a3e635;text-transform:uppercase;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(163,230,53,0.3),transparent);}
.workout-card{display:block;text-decoration:none;color:inherit;border-radius:16px;padding:18px 20px;margin-bottom:12px;position:relative;overflow:hidden;transition:transform 0.15s;background:linear-gradient(135deg,rgba(163,230,53,0.06),#0d0618);border:1px solid rgba(163,230,53,0.22);}
.workout-card:active{transform:scale(0.98);}
.wc-tag{font-size:11px;font-weight:900;letter-spacing:0.18em;padding:3px 9px;border-radius:5px;text-transform:uppercase;margin-bottom:10px;display:inline-block;background:rgba(163,230,53,0.15);color:#a3e635;border:1px solid rgba(163,230,53,0.25);}
.wc-name{font-size:19px;font-weight:900;color:#fff;margin-bottom:4px;padding-right:40px;letter-spacing:-0.01em;}
.wc-focus{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;color:#a3e635;}
.wc-criteria{display:flex;gap:5px;flex-wrap:wrap;}
.crit{font-size:11px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;background:rgba(163,230,53,0.1);color:#a3e635;border:1px solid rgba(163,230,53,0.2);opacity:0.85;}
.wc-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(163,230,53,0.15);border:1px solid rgba(163,230,53,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}

/* ── SAND LIGHT MODE (Phase 7) ─────────────────────────────────────────── */
html[data-theme="light"] body{background:#f5f2ec;color:#1c1a17;}
html[data-theme="light"] .hero{background:linear-gradient(135deg,rgba(163,230,53,0.16),rgba(245,242,236,0.5));border-bottom-color:rgba(163,230,53,0.25);}
html[data-theme="light"] .title{color:#1c1a17;}
html[data-theme="light"] .subtitle{color:#6b6459;}
html[data-theme="light"] .pill{color:#4d7c0f;}
html[data-theme="light"] .week-tabs{background:#f5f2ec;}
html[data-theme="light"] .wtab.active{background:rgba(28,26,23,0.05);}
html[data-theme="light"] .section-head{color:#4d7c0f;}
html[data-theme="light"] .wc-name{color:#1c1a17;}
html[data-theme="light"] .wc-arrow{background:rgba(28,26,23,0.06);color:#1c1a17;}
html[data-theme="light"] .crit{color:#4d7c0f;}
html[data-theme="light"] .workout-card{background:linear-gradient(135deg,rgba(163,230,53,0.1),#faf7f0);}
html[data-theme="light"] .wc-tag{color:#4d7c0f;}
html[data-theme="light"] .wc-focus{color:#4d7c0f;}
</style>
<link rel="stylesheet" href="base.css?v=68"/>
<link rel="stylesheet" href="mc-nav.css"/>

<style>.wtab:active{transform:scale(0.96);} .wtab.active{background:rgba(255,255,255,0.07)!important;}</style>
</head>
<body>
<a href="cat-pmc.html" class="back-link">← PMC Home</a>
<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow">🔥 Project Muscle Confusion</div>
    <h1 class="title">Split #6</h1>
    <p class="subtitle">4 workouts + circuit · Body Part Split · 2-week rotation</p>
    <div class="pills">
      <span class="pill">Superset</span><span class="pill">Pyramid + Drop</span>
      <span class="pill">Low Rep</span><span class="pill">Tempo</span>
      <span class="pill">12-15 Reps</span><span class="pill">20-30 Reps</span>
    </div>
  </div>
</div>

<div class="week-tabs" style="background:#0d0618;border-bottom:1px solid rgba(163,230,53,0.1);padding:0 12px;position:sticky;top:0;z-index:8;">
  <div class="wtabs" style="max-width:680px;margin:0 auto;display:flex;">
    <button class="wtab active" data-w="1" style="flex:1;padding:13px 8px;border:none;cursor:pointer;font-weight:900;font-size:12px;background:transparent;border-bottom:3px solid #a3e635;color:#a3e635;text-align:center;letter-spacing:0.06em;">WEEK 1</button>
    <button class="wtab" data-w="2" style="flex:1;padding:13px 8px;border:none;cursor:pointer;font-weight:900;font-size:12px;background:transparent;border-bottom:3px solid transparent;color:rgba(163,230,53,0.3);text-align:center;letter-spacing:0.06em;">WEEK 2</button>
  </div>
</div>
<div class="content" id="content"></div>
<script>
let week=1;

const WORKOUTS=[
  {tag:'Chest · 1 Muscle', name:'Chest', focus:'Push Day', href:'pmc-workout.html#split6_chest',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12-15 Reps','20-30 Reps'],
   meta:['Weighted push-ups tempo, barbell bench 5x5, incline alt press pyramid, 1-quarter bench drop set, flies × hammer press superset',
         'Same structure · heavier weights · increase intensity from W1']},
  {tag:'Delts + Arms · 3 Muscles', name:'Delts & Arms', focus:'Push + Pull Arms', href:'pmc-workout.html#split6_deltsarms',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12-15 Reps','20-30 Reps'],
   meta:['Reverse pec deck 20, lateral × skull crusher superset pyramid, barbell curl tempo, concentration × lying ext superset, face pulls 20, tri pushdown 20',
         'Same structure · heavier weights across all movements']},
  {tag:'Legs · 2 Muscles', name:'Legs', focus:'Leg Day', href:'pmc-workout.html#split6_legs',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12-15 Reps','20-30 Reps'],
   meta:['Extensions 20, cannonball × RDL superset, barbell squat 5x5 tempo, walking lunges pyramid/drop, step-ups 12-15, calf raises 20',
         'Same structure · heavier weights from W1']},
  {tag:'Back + Traps · 2 Muscles', name:'Back & Traps', focus:'Pull Day', href:'pmc-workout.html#split6_backtraps',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12-15 Reps','20-30 Reps'],
   meta:['Wide PD pyramid, Pendlay rows 5x5, wide shrug 20, cable row 12-15 tempo, incline DB row drop/tempo, seated shrug AMRAP × PD superset 20',
         'Same structure · heavier weights from W1']},
  {tag:'Circuit · Abs/Calves/Forearms', name:'Abs / Calves / Forearms', focus:'Circuit Day', href:'pmc-workout.html#split6_abs',
   criteria:['3 Rounds','Ab Circuit','Calf Work','Forearm Work'],
   meta:['3-round ab circuit: 6-inch/45/90, in & outs, USA twists, heels to heaven · seated + smith calf raises · 3 forearm movements',
         'Same as W1 — increase difficulty or weight where possible']},
];

function renderCards(){
  document.getElementById('content').innerHTML=
    '<div class="section-head">Week '+week+' Workouts</div>'+
    WORKOUTS.map(function(w){
      var meta=week===1?w.meta[0]:w.meta[1];
      return '<a href="'+w.href+'?w='+week+'" class="workout-card">'+
        '<div class="wc-tag">'+w.tag+'</div>'+
        '<div class="wc-name">'+w.name+'</div>'+
        '<div class="wc-focus">'+w.focus+(week===2?' - Week 2':'')+'</div>'+
        '<div class="wc-criteria">'+w.criteria.map(function(c){return '<span class="crit">'+c+'</span>';}).join('')+'</div>'+
        '<div class="wc-arrow">→</div></a>';
    }).join('');
}
document.querySelectorAll('.wtab').forEach(function(b){
  b.addEventListener('click',function(){
    week=parseInt(b.dataset.w);
    document.querySelectorAll('.wtab').forEach(function(t){t.style.borderBottomColor='transparent';t.style.color='rgba(163,230,53,0.3)';});
    b.style.borderBottomColor='#a3e635';b.style.color='#a3e635';
    renderCards();
  });
});
renderCards();
</script>
<script src="mc-supabase.js"></script>
<script src="program-overrides.js"></script>
<script src="mc-nav.js"></script>
</body>
</html>
