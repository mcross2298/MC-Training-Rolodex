<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMC – Split #1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#0a0a0a;min-height:100vh;color:#fff;padding:0 0 60px;}
.back-link{display:inline-block;color:#c084fc;text-decoration:none;font-size:13px;font-weight:700;background:rgba(192,132,252,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(192,132,252,0.3);margin:20px 16px;letter-spacing:0.04em;}
.hero{background:linear-gradient(135deg,#1e0a3c,#0d0618);padding:28px 20px 24px;border-bottom:1px solid rgba(168,85,247,0.15);}
.hero-inner{max-width:680px;margin:0 auto;}
.eyebrow{font-size:11px;font-weight:900;letter-spacing:0.28em;color:#a855f7;text-transform:uppercase;margin-bottom:8px;}
.title{font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.02em;margin-bottom:4px;}
.subtitle{font-size:12px;color:#6b7280;line-height:1.5;}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.pill{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.25);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:800;color:#c084fc;letter-spacing:0.06em;text-transform:uppercase;}
.week-tabs{background:#0a0a0a;border-bottom:1px solid rgba(168,85,247,0.1);padding:0 12px;position:sticky;top:0;z-index:8;}
.wtabs{max-width:680px;margin:0 auto;display:flex;}
.wtab{flex:1;padding:13px 8px;border:none;cursor:pointer;font-weight:900;font-size:12px;background:transparent;color:#3b1f5e;border-bottom:3px solid transparent;text-align:center;letter-spacing:0.06em;}
.wtab.active{color:#a855f7;border-bottom-color:#a855f7;background:rgba(255,255,255,0.07);}
.wtab:active{transform:scale(0.96);}
.content{max-width:680px;margin:20px auto 0;padding:0 16px;}
.section-head{font-size:11px;font-weight:900;letter-spacing:0.22em;color:#a855f7;text-transform:uppercase;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(168,85,247,0.3),transparent);}
.workout-card{display:block;text-decoration:none;color:inherit;border-radius:16px;padding:18px 20px;margin-bottom:12px;position:relative;overflow:hidden;transition:transform 0.15s;}
.workout-card:active{transform:scale(0.98);}
.workout-card.legs{background:linear-gradient(135deg,#052e16,#0d0618);border:1px solid rgba(74,222,128,0.25);}
.workout-card.chest{background:linear-gradient(135deg,#1c0a00,#0d0618);border:1px solid rgba(251,146,60,0.25);}
.workout-card.arms{background:linear-gradient(135deg,#1a0511,#0d0618);border:1px solid rgba(244,114,182,0.25);}
.workout-card.back{background:linear-gradient(135deg,#042f2e,#0d0618);border:1px solid rgba(34,211,238,0.25);}
.wc-tag{font-size:11px;font-weight:900;letter-spacing:0.18em;padding:3px 9px;border-radius:5px;text-transform:uppercase;margin-bottom:10px;display:inline-block;}
.legs .wc-tag{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.25);}
.chest .wc-tag{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.25);}
.arms .wc-tag{background:rgba(244,114,182,0.15);color:#f472b6;border:1px solid rgba(244,114,182,0.25);}
.back .wc-tag{background:rgba(34,211,238,0.15);color:#22d3ee;border:1px solid rgba(34,211,238,0.25);}
.wc-name{font-size:19px;font-weight:900;color:#fff;margin-bottom:4px;padding-right:40px;letter-spacing:-0.01em;}
.wc-focus{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
.legs .wc-focus{color:#4ade80;}
.chest .wc-focus{color:#fb923c;}
.arms .wc-focus{color:#f472b6;}
.back .wc-focus{color:#22d3ee;}
.wc-criteria{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.crit{font-size:11px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.2);}
.wc-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
</style>
<link rel="stylesheet" href="base.css?v=65"/>
<link rel="stylesheet" href="mc-nav.css"/>
</head>
<body>
<a href="pmc-home.html" class="back-link">← PMC Home</a>
<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow">⚡ Project Muscle Confusion</div>
    <h1 class="title">Split #1</h1>
    <p class="subtitle">5 workouts · 2-week rotation · Full chaos methodology</p>
    <div class="pills">
      <span class="pill">Superset</span>
      <span class="pill">Pyramid + Drop</span>
      <span class="pill">Low Rep</span>
      <span class="pill">Tempo</span>
      <span class="pill">12–15 Reps</span>
      <span class="pill">20–30 Reps</span>
    </div>
  </div>
</div>
<div class="week-tabs" id="weekTabs">
  <div class="wtabs">
    <button class="wtab active" data-w="1">WEEK 1</button>
    <button class="wtab" data-w="2">WEEK 2</button>
  </div>
</div>
<div class="content" id="content"></div>
<script>
let week = 1;
const WORKOUTS = [
  {cls:'legs', tag:'Legs · Quad Focus', name:'Leg Day — Quads', focus:'Quad Dominant', href:'pmc-workout.html#split1_legs',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12–15 Reps','20–30 Reps'],
   meta:['Extensions × RDL superset, barbell squat 5×5, machine press pyramid/drop, split squat tempo, calf raises pump',
         'Leg press × ham curl superset, cannonball 4×6, neutral squat pyramid/drop, leg extension tempo, calf raises pump']},
  {cls:'chest', tag:'Chest · Shoulders', name:'Chest & Shoulders', focus:'Push Day', href:'pmc-workout.html#split1_chest',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12–15 Reps','20–30 Reps'],
   meta:['High incline flies × laterals superset, incline press 5×5, flat machine pyramid/drop, slight incline tempo, pec deck + reverse pec pump',
         'High incline flies × seated lateral superset, slight incline pyramid/drop, incline press 4×6, flat machine tempo, pec deck + reverse pec pump']},
  {cls:'arms', tag:'Biceps · Triceps', name:'Biceps & Triceps', focus:'Arms Day', href:'pmc-workout.html#split1_bistris',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12–15 Reps','20–30 Reps'],
   meta:['DB curls × dip machine superset, barbell curl 5×5, machine preacher pyramid/drop, skull crusher tempo, rope + cable curl pump',
         'Incline curl × overhead extension superset, wide curl pyramid/drop, SM close grip 4×6, preacher tempo, V-bar + cable curl pump']},
  {cls:'legs', tag:'Legs · Hams & Glutes', name:'Leg Day — Hams & Glutes', focus:'Posterior Chain', href:'pmc-workout.html#split1_leghams',
   criteria:['Superset','Pyramid+Drop','Low Rep','Tempo','12–15 Reps','20–30 Reps'],
   meta:['Lying curl × extension superset, bilateral RDL 5×5, seated curl pyramid/drop, good mornings tempo, glute machine + leg press pump',
         'Seated curl × extension superset, RDL/deadlift 5×5, lying curl pyramid/drop, good mornings tempo, glute machine + leg press pump']},
  {cls:'back', tag:'Back', name:'Back', focus:'Pull Day', href:'pmc-workout.html#split1_back',
   criteria:['Warmup: Pull-Ups','Superset','Pyramid+Drop','Low Rep','Tempo','20–30 Reps'],
   meta:['Wide PD × seated cable row superset, Pendlay rows 5×5, machine low row pyramid/drop, incline DB row tempo, straight arm PD pump',
         'Reverse PD × machine high row superset, bent over row 5×5, wide PD pyramid/drop, V-grip 4×10 tempo, straight arm + machine mid row pump']},
];

function render() {
  document.getElementById('content').innerHTML =
    '<div class="section-head">Week ' + week + ' Workouts</div>' +
    WORKOUTS.map(function(w) {
      var meta = week === 1 ? w.meta[0] : w.meta[1];
      return '<a href="' + w.href + '?w=' + week + '" class="workout-card ' + w.cls + '">' +
        '<div class="wc-tag">' + w.tag + '</div>' +
        '<div class="wc-name">' + w.name + '</div>' +
        '<div class="wc-focus">' + w.focus + (week === 2 ? ' — Week 2' : '') + '</div>' +
        '<div class="wc-criteria">' +
        w.criteria.map(function(c) { return '<span class="crit">' + c + '</span>'; }).join('') +
        '</div>' +
        '<div class="wc-arrow">→</div>' +
        '</a>';
    }).join('');
}

document.querySelectorAll('.wtab').forEach(function(b) {
  b.addEventListener('click', function() {
    week = parseInt(b.dataset.w);
    document.querySelectorAll('.wtab').forEach(function(t) { t.classList.remove('active'); });
    b.classList.add('active');
    render();
  });
});
render();
</script>
<script src="mc-nav.js"></script>
</body>
</html>
